<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA STRIKE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Orbitron', monospace;
    overflow: hidden;
  }
  canvas { display: block; }
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }
  #hud {
    position: absolute;
    top: 16px; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 0 20px;
    pointer-events: none;
  }
  .hud-block { text-align: center; }
  .hud-label { font-size: 0.55rem; letter-spacing: 0.2em; color: #0af; opacity: 0.7; }
  .hud-val { font-size: 1.4rem; font-weight: 900; color: #0af; text-shadow: 0 0 12px #0af; letter-spacing: 0.1em; }
  #lives { display: flex; gap: 6px; align-items: center; margin-top: 2px; }
  .life-icon { width: 14px; height: 14px; background: #f05; clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); box-shadow: 0 0 8px #f05; }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    pointer-events: all;
  }
  #overlay.hidden { display: none; }
  .ov-title {
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    font-weight: 900;
    color: #0af;
    text-shadow: 0 0 40px #0af, 0 0 80px #0055ff;
    letter-spacing: 0.15em;
    text-align: center;
    line-height: 1.1;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { text-shadow: 0 0 30px #0af, 0 0 60px #0055ff; }
    50% { text-shadow: 0 0 60px #0af, 0 0 120px #0055ff, 0 0 180px #0055ff; }
  }
  .ov-sub {
    font-size: 0.75rem;
    color: #0af;
    opacity: 0.6;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }
  .ov-score {
    font-size: 1.1rem;
    color: #ff0;
    text-shadow: 0 0 16px #ff0;
    letter-spacing: 0.15em;
  }
  .btn-start {
    margin-top: 8px;
    padding: 16px 48px;
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    background: transparent;
    color: #0af;
    border: 2px solid #0af;
    border-radius: 4px;
    cursor: pointer;
    pointer-events: all;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(0,170,255,0.3), inset 0 0 20px rgba(0,170,255,0.05);
    text-transform: uppercase;
  }
  .btn-start:hover {
    background: rgba(0,170,255,0.15);
    box-shadow: 0 0 40px rgba(0,170,255,0.6), inset 0 0 20px rgba(0,170,255,0.1);
    transform: scale(1.04);
  }
  .controls-hint {
    font-size: 0.62rem;
    color: #0af;
    opacity: 0.4;
    letter-spacing: 0.15em;
    text-align: center;
    line-height: 2;
  }
  #bossbar {
    position: absolute;
    bottom: 20px; left: 50%; transform: translateX(-50%);
    width: min(400px, 80vw);
    display: none;
  }
  #bossbar.show { display: block; }
  .boss-label { font-size: 0.6rem; color: #f05; letter-spacing: 0.2em; text-align: center; margin-bottom: 4px; }
  .boss-track { height: 8px; background: #111; border: 1px solid #f05; border-radius: 2px; overflow: hidden; }
  .boss-fill { height: 100%; background: linear-gradient(90deg, #f05, #f80); border-radius: 2px; transition: width 0.1s; box-shadow: 0 0 8px #f05; }
  #powerups {
    position: absolute;
    bottom: 52px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; align-items: center;
  }
  .pu-icon {
    font-size: 0.65rem; letter-spacing: 0.1em;
    background: rgba(0,0,0,0.6); border: 1px solid;
    border-radius: 4px; padding: 3px 8px;
    display: none;
  }
  .pu-icon.active { display: block; }
  .pu-rapid { color: #0ff; border-color: #0ff; box-shadow: 0 0 8px #0ff; }
  .pu-triple { color: #ff0; border-color: #ff0; box-shadow: 0 0 8px #ff0; }
  .pu-shield { color: #0f8; border-color: #0f8; box-shadow: 0 0 8px #0f8; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud">
    <div class="hud-block">
      <div class="hud-label">SCORE</div>
      <div class="hud-val" id="scoreEl">0</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">LIVES</div>
      <div id="lives"></div>
    </div>
    <div class="hud-block">
      <div class="hud-label">LEVEL</div>
      <div class="hud-val" id="levelEl">1</div>
    </div>
  </div>
  <div id="bossbar">
    <div class="boss-label">⚠ BOSS</div>
    <div class="boss-track"><div class="boss-fill" id="bossFill" style="width:100%"></div></div>
  </div>
  <div id="powerups">
    <div class="pu-icon pu-rapid" id="puRapid">⚡ RAPID</div>
    <div class="pu-icon pu-triple" id="puTriple">✦ TRIPLE</div>
    <div class="pu-icon pu-shield" id="puShield">🛡 SHIELD</div>
  </div>
  <div id="overlay">
    <div class="ov-title" id="ovTitle">NOVA<br>STRIKE</div>
    <div class="ov-sub" id="ovSub">スペースシューター</div>
    <div class="ov-score" id="ovScore" style="display:none"></div>
    <button class="btn-start" id="startBtn" onclick="startGame()">START</button>
    <div class="controls-hint">
      ← → キー : 移動 &nbsp;|&nbsp; 射撃は自動<br>
      スマホ: 画面を左右にスライドで移動
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = Math.min(window.innerWidth, 480);
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); });

// Stars
let stars = [];
function initStars() {
  stars = Array.from({length: 120}, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.5 + 0.3,
    s: Math.random() * 1.5 + 0.3,
    b: Math.random()
  }));
}

// Game state
let state = 'title';
let score = 0, lives = 3, level = 1;
let hiScore = parseInt(localStorage.getItem('novaStrikeHi') || '0');

// Powerups
let puRapid = 0, puTriple = 0, puShield = 0; // frames remaining
let items = []; // dropped items

// Player
let player = {};
function initPlayer() {
  player = { x: W/2, y: H - 80, w: 36, h: 40, speed: 4.5, invincible: 0, shootCooldown: 0 };
}

// Bullets, enemies, particles, boss
let bullets = [], eBullets = [], enemies = [], particles = [], boss = null;
let shootTimer = 0;
let enemySpawnTimer = 0;
let bossTimer = 0;
let bossActive = false;

// Input
const keys = {};
document.addEventListener('keydown', e => keys[e.code] = true);
document.addEventListener('keyup', e => keys[e.code] = false);

// Touch - slide to move (iPhone対応: canvasの実寸比率を毎フレーム計算)
let touchLastX = null, touchActive = false;

function getCanvasX(clientX) {
  const rect = canvas.getBoundingClientRect();
  // canvasの論理幅 / 表示幅 でスケール補正
  return (clientX - rect.left) * (canvas.width / rect.width);
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchLastX = getCanvasX(e.touches[0].clientX);
  touchActive = true;
}, {passive: false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchActive || state !== 'playing') return;
  const tx = getCanvasX(e.touches[0].clientX);
  player.x = Math.max(20, Math.min(W - 20, player.x + (tx - touchLastX)));
  touchLastX = tx;
}, {passive: false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchActive = false;
  touchLastX = null;
}, {passive: false});

document.getElementById('startBtn').addEventListener('touchstart', e => {
  e.stopPropagation();
});

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('bossbar').classList.remove('show');
  score = 0; lives = 3; level = 1;
  bullets = []; eBullets = []; enemies = []; particles = []; boss = null; items = [];
  puRapid = 0; puTriple = 0; puShield = 0;
  bossActive = false; enemySpawnTimer = 0; bossTimer = 0;
  initPlayer();
  updateHUD();
  updatePowerupHUD();
  state = 'playing';
}

function updateHUD() {
  document.getElementById('scoreEl').textContent = score;
  document.getElementById('levelEl').textContent = level;
  const lv = document.getElementById('lives');
  lv.innerHTML = Array.from({length: lives}, () => `<div class="life-icon"></div>`).join('');
}

function updatePowerupHUD() {
  document.getElementById('puRapid').classList.toggle('active', puRapid > 0);
  document.getElementById('puTriple').classList.toggle('active', puTriple > 0);
  document.getElementById('puShield').classList.toggle('active', puShield > 0);
}

// Spawn item drop
function spawnItem(x, y) {
  const roll = Math.random();
  let type;
  if (roll < 0.3) type = 'heal';
  else if (roll < 0.55) type = 'rapid';
  else if (roll < 0.78) type = 'triple';
  else type = 'shield';
  items.push({ x, y, type, vy: 1.2, life: 600 });
}

function drawItem(it) {
  ctx.save();
  ctx.translate(it.x, it.y);
  const labels = { heal:'❤️', rapid:'⚡', triple:'✦', shield:'🛡' };
  const colors = { heal:'#f44', rapid:'#0ff', triple:'#ff0', shield:'#0f8' };
  ctx.shadowColor = colors[it.type];
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(0, 0, 12, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fill();
  ctx.strokeStyle = colors[it.type];
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.font = '13px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(labels[it.type], 0, 1);
  ctx.restore();
}

// Spawn enemy
function spawnEnemy() {
  const types = ['basic','zigzag','tank','sniper'];
  let t;
  if (level >= 4) t = types[Math.floor(Math.random()*4)];
  else if (level >= 3) t = types[Math.floor(Math.random()*3)];
  else if (level >= 2) t = Math.random()<0.6?'basic':'zigzag';
  else t = 'basic';
  const x = 20 + Math.random() * (W - 40);
  let e = { x, y: -30, w: 28, h: 28, type: t, shootTimer: 50 + Math.random()*40, phase: 0, hp: 1 };
  if (t==='basic')  { e.vy=1.4+level*0.18; e.vx=0; e.hp=1; }
  if (t==='zigzag') { e.vy=1.2+level*0.12; e.vx=1.8+level*0.1; e.dir=Math.random()<0.5?1:-1; e.hp=1; }
  if (t==='tank')   { e.vy=0.8+level*0.08; e.vx=0; e.hp=3+level; }
  if (t==='sniper') { e.vy=0.7; e.vx=0; e.hp=2; e.shootTimer=40; } // 連射抑え目
  enemies.push(e);
}

// Spawn boss
function spawnBoss() {
  bossActive = true;
  enemies = [];
  boss = { x: W/2, y: 60, w: 70, h: 50, hp: 20 + level*10, maxHp: 20+level*10, vx: 1.8+level*0.2, phase: 0, shootTimer: 0 };
  document.getElementById('bossbar').classList.add('show');
}

function addParticle(x, y, color, n=8) {
  for(let i=0;i<n;i++) {
    const ang = Math.random()*Math.PI*2;
    const spd = 1+Math.random()*3;
    particles.push({ x, y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, life: 1, color, r: 2+Math.random()*3 });
  }
}

function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.invincible/4)%2===0) return;
  ctx.save();
  ctx.translate(player.x, player.y);
  // Body
  ctx.beginPath();
  ctx.moveTo(0, -20);
  ctx.lineTo(14, 18);
  ctx.lineTo(6, 10);
  ctx.lineTo(-6, 10);
  ctx.lineTo(-14, 18);
  ctx.closePath();
  ctx.fillStyle = '#0af';
  ctx.shadowColor = '#0af';
  ctx.shadowBlur = 14;
  ctx.fill();
  // Wings
  ctx.beginPath();
  ctx.moveTo(-14, 18);
  ctx.lineTo(-22, 10);
  ctx.lineTo(-8, 2);
  ctx.closePath();
  ctx.fillStyle = '#0088cc';
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(14, 18);
  ctx.lineTo(22, 10);
  ctx.lineTo(8, 2);
  ctx.closePath();
  ctx.fill();
  // Engine glow
  ctx.beginPath();
  ctx.arc(0, 16, 5, 0, Math.PI*2);
  ctx.fillStyle = '#ff8800';
  ctx.shadowColor = '#ff8800';
  ctx.shadowBlur = 16;
  ctx.fill();
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  if (e.type === 'basic') {
    ctx.beginPath();
    ctx.moveTo(0, 14);
    ctx.lineTo(12, -14);
    ctx.lineTo(0, -6);
    ctx.lineTo(-12, -14);
    ctx.closePath();
    ctx.fillStyle = '#f05';
    ctx.shadowColor = '#f05';
    ctx.shadowBlur = 12;
    ctx.fill();
  } else if (e.type === 'zigzag') {
    ctx.beginPath();
    ctx.moveTo(0, 14);
    ctx.lineTo(14, -10);
    ctx.lineTo(0, 0);
    ctx.lineTo(-14, -10);
    ctx.closePath();
    ctx.fillStyle = '#f80';
    ctx.shadowColor = '#f80';
    ctx.shadowBlur = 12;
    ctx.fill();
  } else {
    ctx.beginPath();
    ctx.arc(0, 0, 16, 0, Math.PI*2);
    ctx.fillStyle = '#a0f';
    ctx.shadowColor = '#a0f';
    ctx.shadowBlur = 16;
    ctx.fill();
    // HP bar
    ctx.fillStyle = '#333';
    ctx.fillRect(-14, -22, 28, 4);
    ctx.fillStyle = '#a0f';
    ctx.fillRect(-14, -22, 28*(e.hp/3), 4);
  }
  ctx.restore();
}

function drawBoss() {
  if (!boss) return;
  ctx.save();
  ctx.translate(boss.x, boss.y);
  // Main body
  ctx.beginPath();
  ctx.moveTo(0, -24);
  ctx.lineTo(34, 24);
  ctx.lineTo(0, 12);
  ctx.lineTo(-34, 24);
  ctx.closePath();
  ctx.fillStyle = '#f05';
  ctx.shadowColor = '#f05';
  ctx.shadowBlur = 24;
  ctx.fill();
  // Center core
  ctx.beginPath();
  ctx.arc(0, 4, 12, 0, Math.PI*2);
  ctx.fillStyle = '#ff0';
  ctx.shadowColor = '#ff0';
  ctx.shadowBlur = 20;
  ctx.fill();
  ctx.restore();
  // Boss HP bar
  const fill = document.getElementById('bossFill');
  fill.style.width = Math.max(0, (boss.hp / boss.maxHp) * 100) + '%';
}

let raf;
let lastTime = 0;

function loop(ts) {
  raf = requestAnimationFrame(loop);
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  // Clear
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s => {
    s.y += s.s * 0.4;
    if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
    s.b += 0.02;
    const alpha = 0.3 + 0.5*Math.abs(Math.sin(s.b));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(180,220,255,${alpha})`;
    ctx.fill();
  });

  if (state !== 'playing') return;

  // Move player
  if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 20) player.x -= player.speed;
  if ((keys['ArrowRight'] || keys['KeyD']) && player.x < W-20) player.x += player.speed;
  if (player.invincible > 0) player.invincible--;

  // Powerup timers
  if (puRapid > 0) { puRapid--; if (puRapid === 0) updatePowerupHUD(); }
  if (puTriple > 0) { puTriple--; if (puTriple === 0) updatePowerupHUD(); }
  if (puShield > 0) { puShield--; if (puShield === 0) updatePowerupHUD(); }

  // Auto-shoot
  player.shootCooldown--;
  if (player.shootCooldown <= 0) {
    const rapid = puRapid > 0;
    const triple = puTriple > 0 || level >= 4;
    bullets.push({ x: player.x, y: player.y - 20, vy: -16, w: 4, h: 14 });
    if (triple) {
      bullets.push({ x: player.x-16, y: player.y-10, vy: -16, w: 4, h: 14 });
      bullets.push({ x: player.x+16, y: player.y-10, vy: -16, w: 4, h: 14 });
    }
    player.shootCooldown = rapid ? Math.max(4, 10 - level) : Math.max(8, 18 - level*2);
  }

  // Items
  items = items.filter(it => {
    it.y += it.vy;
    it.life--;
    drawItem(it);
    // 取得判定（範囲を広めに）
    const dist = Math.hypot(it.x - player.x, it.y - player.y);
    if (dist < 30) {
      addParticle(it.x, it.y, it.type==='heal'?'#f44':'#ff0', 12);
      if (it.type === 'heal') {
        lives = Math.min(5, lives + 1);
        updateHUD();
      } else if (it.type === 'rapid') { puRapid = 400; updatePowerupHUD(); }
      else if (it.type === 'triple') { puTriple = 400; updatePowerupHUD(); }
      else if (it.type === 'shield') { puShield = 300; player.invincible = 300; updatePowerupHUD(); }
      return false;
    }
    return it.y < H + 20 && it.life > 0;
  });

  // Bullets
  bullets = bullets.filter(b => {
    b.y += b.vy;
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#0ff';
    ctx.fillRect(b.x - b.w/2, b.y, b.w, b.h);
    ctx.shadowBlur = 0;
    // アイテムに当たっても消えない（通過する）
    // 敵弾との相殺
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const eb = eBullets[i];
      if (Math.abs(b.x - eb.x) < 10 && Math.abs(b.y - eb.y) < 10) {
        addParticle(eb.x, eb.y, '#fff', 5);
        eBullets.splice(i, 1);
        return false;
      }
    }
    return b.y > -20;
  });

  // Enemy bullets
  eBullets = eBullets.filter(b => {
    b.x += b.vx || 0;
    b.y += b.vy;
    ctx.shadowColor = '#f05';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#f05';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // Hit player
    if (player.invincible <= 0 && Math.abs(b.x-player.x)<18 && Math.abs(b.y-player.y)<22) {
      addParticle(player.x, player.y, '#0af', 12);
      lives--;
      updateHUD();
      player.invincible = 90;
      if (lives <= 0) gameOver();
      return false;
    }
    return b.y < H+10 && b.x > -10 && b.x < W+10;
  });

  // Enemies
  if (!bossActive) {
    enemySpawnTimer++;
    const interval = Math.max(25, 70 - level*7);
    if (enemySpawnTimer >= interval) { spawnEnemy(); enemySpawnTimer = 0; }
    bossTimer++;
    if (bossTimer >= 400 + level*60) spawnBoss();
  }

  enemies = enemies.filter(e => {
    // Move
    if (e.type === 'zigzag') {
      e.x += e.vx * e.dir;
      if (e.x < 20 || e.x > W-20) e.dir *= -1;
    }
    e.y += e.vy;
    e.phase += 0.05;

    // Enemy shoot
    e.shootTimer--;
    if (e.shootTimer <= 0) {
      const dx = player.x - e.x, dy = player.y - e.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      const spd = e.type==='sniper' ? 5 : 3.2;
      if (e.type==='sniper') {
        // 3方向弾
        [-0.2, 0, 0.2].forEach(angle => {
          const cos = Math.cos(angle), sin = Math.sin(angle);
          const vx2 = (dx/dist)*spd*cos - (dy/dist)*spd*sin;
          const vy2 = (dx/dist)*spd*sin + (dy/dist)*spd*cos;
          eBullets.push({ x: e.x, y: e.y, vx: vx2, vy: vy2 });
        });
      } else {
        eBullets.push({ x: e.x, y: e.y, vx: (dx/dist)*spd, vy: (dy/dist)*spd });
      }
      e.shootTimer = e.type==='sniper' ? 40 : Math.max(30, 60 - level*4) + Math.random()*20;
    }

    drawEnemy(e);

    // Bullet collision
    for (let i = bullets.length-1; i >= 0; i--) {
      const b = bullets[i];
      if (Math.abs(b.x-e.x)<16 && Math.abs(b.y-e.y)<18) {
        bullets.splice(i, 1);
        e.hp--;
        addParticle(e.x, e.y, e.type==='basic'?'#f05':e.type==='zigzag'?'#f80':'#a0f');
        if (e.hp <= 0) {
          score += e.type==='tank'?150:50;
          updateHUD();
          addParticle(e.x, e.y, '#ff0', 16);
          if (Math.random() < 0.25) spawnItem(e.x, e.y);
          return false;
        }
        break;
      }
    }
    // Hit player
    if (player.invincible<=0 && Math.abs(e.x-player.x)<24 && Math.abs(e.y-player.y)<28) {
      addParticle(player.x, player.y, '#0af', 12);
      lives--; updateHUD(); player.invincible = 90;
      if (lives<=0) gameOver();
      return false;
    }
    return e.y < H + 40;
  });

  // Boss
  if (bossActive && boss) {
    boss.x += boss.vx;
    if (boss.x < 50 || boss.x > W-50) boss.vx *= -1;
    boss.y = 60 + Math.sin(boss.phase) * 20;
    boss.phase += 0.02;

    boss.shootTimer--;
    if (boss.shootTimer <= 0) {
      const hpRatio = boss.hp / boss.maxHp;
      const patterns = [
        [{vx:0,vy:4}],
        [{vx:-2,vy:3.5},{vx:0,vy:4},{vx:2,vy:3.5}],
        [{vx:-3,vy:3},{vx:-1,vy:4},{vx:1,vy:4},{vx:3,vy:3}],
        Array.from({length:6},(_,i)=>({vx:Math.cos(i*Math.PI/3)*3.5, vy:Math.sin(i*Math.PI/3)*3.5})),
      ];
      const pi = hpRatio > 0.6 ? 0 : hpRatio > 0.35 ? 1 : hpRatio > 0.15 ? 2 : 3;
      patterns[pi].forEach(v => eBullets.push({x:boss.x,y:boss.y+30,vx:v.vx,vy:v.vy}));
      boss.shootTimer = Math.max(18, 40 - level*3);
    }

    drawBoss();

    // Bullet hit boss
    for (let i = bullets.length-1; i >= 0; i--) {
      const b = bullets[i];
      if (Math.abs(b.x-boss.x)<38 && Math.abs(b.y-boss.y)<30) {
        bullets.splice(i,1);
        boss.hp--;
        addParticle(b.x, b.y, '#ff0', 4);
        if (boss.hp <= 0) {
          addParticle(boss.x, boss.y, '#ff0', 40);
          addParticle(boss.x, boss.y, '#f05', 30);
          spawnItem(boss.x, boss.y);
          spawnItem(boss.x - 30, boss.y);
          spawnItem(boss.x + 30, boss.y);
          score += 1000 + level * 200;
          level++;
          bossActive = false;
          boss = null;
          bossTimer = 0;
          enemySpawnTimer = 0;
          updateHUD();
          document.getElementById('bossbar').classList.remove('show');
        }
        break;
      }
    }
    // Boss hits player
    if (player.invincible<=0 && boss && Math.abs(boss.x-player.x)<44 && Math.abs(boss.y-player.y)<36) {
      lives--; updateHUD(); player.invincible = 90;
      if (lives<=0) gameOver();
    }
  }

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08;
    p.life -= 0.04;
    ctx.globalAlpha = p.life;
    const radius = Math.max(0, p.r * p.life);
    if (radius <= 0) return false;
    ctx.beginPath();
    ctx.arc(p.x, p.y, radius, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    return p.life > 0;
  });

  drawPlayer();
}

function gameOver() {
  state = 'gameover';
  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('novaStrikeHi', hiScore);
  }
  setTimeout(() => {
    const ov = document.getElementById('overlay');
    ov.classList.remove('hidden');
    document.getElementById('ovTitle').textContent = 'GAME\nOVER';
    document.getElementById('ovTitle').style.color = '#f05';
    document.getElementById('ovTitle').style.textShadow = '0 0 40px #f05, 0 0 80px #880000';
    document.getElementById('ovSub').textContent = 'SCORE: ' + score;
    document.getElementById('ovScore').style.display = 'block';
    document.getElementById('ovScore').textContent = 'HI-SCORE: ' + hiScore;
    document.getElementById('startBtn').textContent = 'RETRY';
    document.getElementById('bossbar').classList.remove('show');
  }, 800);
}

// Init
initStars();
initPlayer();
if (hiScore > 0) {
  document.getElementById('ovScore').style.display = 'block';
  document.getElementById('ovScore').textContent = 'HI-SCORE: ' + hiScore;
}
requestAnimationFrame(loop);
</script>
