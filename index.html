<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>族鬼列伝 ZOKKOU RETSUDEN</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1008;--paper:#f5e8c8;--red:#c0392b;--gold:#d4a017;
  --blue:#1a3a5c;--shadow:#0a0804;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0804;display:flex;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;font-family:'Zen Antique Soft',serif}
canvas{display:block;touch-action:none;image-rendering:pixelated}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}

/* ── HUD ── */
#hud{position:absolute;top:0;left:0;right:0;padding:8px 10px;
  display:flex;align-items:flex-start;gap:8px;
  background:linear-gradient(180deg,rgba(0,0,0,.7) 0%,transparent 100%)}
.hud-panel{background:rgba(10,8,4,.75);border:1px solid rgba(212,160,23,.3);
  border-radius:3px;padding:5px 8px;backdrop-filter:blur(2px)}
.hud-name{font-size:.62rem;color:var(--gold);letter-spacing:.2em;margin-bottom:2px}
.bar-wrap{width:110px;height:10px;background:#1a1008;border-radius:2px;overflow:hidden;border:1px solid #333}
.bar-fill{height:100%;border-radius:2px;transition:width .1s}
.hp-fill{background:linear-gradient(90deg,#c0392b,#e74c3c)}
.sp-fill{background:linear-gradient(90deg,#d4a017,#f1c40f)}
.hud-sub{font-size:.5rem;color:#666;margin-top:2px;font-family:'Share Tech Mono',monospace}
#hud-center{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
#stage-label{font-size:.65rem;color:var(--gold);letter-spacing:.3em;text-shadow:0 0 10px var(--gold)}
#score-val{font-size:.9rem;color:#fff;font-family:'Share Tech Mono',monospace;letter-spacing:.1em}
#ally-panel{display:flex;gap:5px}
.ally-dot{width:10px;height:10px;border-radius:50%;background:#2a5a2a;border:1px solid #4a8a4a;transition:background .2s}
.ally-dot.alive{background:#3a9a3a;box-shadow:0 0 4px #3a9a3a}
.ally-dot.hurt{background:#8a4a1a}
.sp-icons{display:flex;gap:2px;margin-top:2px}
.sp-icon{font-size:.7rem;opacity:.3;transition:opacity .2s}
.sp-icon.ready{opacity:1;filter:drop-shadow(0 0 3px #f1c40f)}

/* ── ANNOUNCE ── */
#announce{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);
  font-size:clamp(2rem,9vw,4.5rem);color:#fff;letter-spacing:.15em;
  pointer-events:none;opacity:0;white-space:nowrap;text-align:center;
  text-shadow:3px 3px 0 #c0392b,6px 6px 0 rgba(0,0,0,.5)}
#announce.show{opacity:1;animation:apop .3s ease}
@keyframes apop{0%{transform:translate(-50%,-50%) scale(.2) rotate(-5deg)}
  70%{transform:translate(-50%,-50%) scale(1.05) rotate(1deg)}
  100%{transform:translate(-50%,-50%) scale(1) rotate(0deg)}}
#sub-announce{position:absolute;top:54%;left:50%;transform:translateX(-50%);
  font-size:clamp(.8rem,3vw,1.3rem);color:var(--gold);letter-spacing:.3em;
  pointer-events:none;opacity:0;white-space:nowrap}
#sub-announce.show{opacity:1;animation:sfade 1.2s ease forwards}
@keyframes sfade{0%{opacity:0;transform:translateX(-50%) translateY(8px)}
  20%{opacity:1;transform:translateX(-50%) translateY(0)}
  80%{opacity:1}100%{opacity:0}}

/* ── SCREENS ── */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;pointer-events:all}
.screen.hidden{display:none}
.title-bg{position:absolute;inset:0;overflow:hidden}
.title-bg::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.01) 2px,rgba(255,255,255,.01) 4px)}
.ink-title{font-size:clamp(2.5rem,11vw,6rem);text-align:center;line-height:.9;
  color:#f5e8c8;text-shadow:4px 4px 0 #8b0000,8px 8px 0 rgba(0,0,0,.6);letter-spacing:.05em}
.ink-title .sub{font-size:clamp(.9rem,3vw,1.6rem);color:var(--gold);letter-spacing:.5em;display:block;margin-top:6px}
.ink-title .catch{font-size:clamp(.6rem,2vw,.9rem);color:#888;letter-spacing:.2em;display:block;margin-top:8px;font-family:'Share Tech Mono',monospace}

.btn{padding:12px 32px;font-family:'Zen Antique Soft',serif;font-size:1rem;
  letter-spacing:.2em;background:transparent;color:var(--paper);
  border:2px solid rgba(212,160,23,.4);border-radius:2px;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,
  rgba(212,160,23,.1),transparent);opacity:0;transition:opacity .2s}
.btn:hover,.btn:active{border-color:var(--gold);color:var(--gold);
  box-shadow:0 0 20px rgba(212,160,23,.3),inset 0 0 20px rgba(212,160,23,.05)}
.btn:hover::before{opacity:1}
.btn.big{font-size:1.3rem;padding:14px 48px}
.stage-select{display:flex;flex-direction:column;gap:8px;width:min(360px,90vw)}
/* ── STAGE SELECT CAROUSEL ── */
.stage-carousel-wrap{position:relative;z-index:1;width:100%;max-width:520px;margin:0 auto}
.stage-carousel{display:flex;overflow:hidden;width:100%;position:relative}
.stage-cards-track{display:flex;transition:transform .35s cubic-bezier(.4,0,.2,1);will-change:transform}
.stage-card{flex:0 0 min(300px,80vw);margin:0 8px;
  border:2px solid rgba(212,160,23,.25);border-radius:8px;overflow:hidden;
  cursor:pointer;transition:border-color .2s,box-shadow .2s;position:relative;
  background:#0a0804;user-select:none}
.stage-card.active{border-color:var(--gold);box-shadow:0 0 18px rgba(212,160,23,.35)}
.stage-card-preview{width:100%;height:90px;position:relative;overflow:hidden}
.stage-card-preview canvas{width:100%;height:100%;display:block}
.stage-card-body{padding:10px 12px 12px}
.stage-card-num{font-size:.5rem;color:#555;letter-spacing:.3em;font-family:'Share Tech Mono',monospace}
.stage-card-name{font-size:.95rem;color:var(--paper);letter-spacing:.12em;margin:2px 0}
.stage-card-desc{font-size:.5rem;color:#666;letter-spacing:.08em;font-family:'Share Tech Mono',monospace;line-height:1.5}
.stage-card-diff{font-size:.6rem;margin-top:6px;letter-spacing:.1em}
.stage-card-boss{font-size:.5rem;color:#c0392b;letter-spacing:.08em;margin-top:4px;font-family:'Share Tech Mono',monospace}
.carousel-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:10px;position:relative;z-index:1}
.carousel-arrow{width:36px;height:36px;border:1px solid rgba(212,160,23,.4);border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:var(--gold);font-size:1rem;transition:all .2s;background:rgba(0,0,0,.5)}
.carousel-arrow:hover{border-color:var(--gold);background:rgba(212,160,23,.1)}
.carousel-arrow:active{transform:scale(.9)}
.carousel-dots{display:flex;gap:6px;align-items:center}
.carousel-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);
  transition:all .2s;cursor:pointer}
.carousel-dot.on{background:var(--gold);transform:scale(1.3)}
.stage-select-btn{margin-top:8px;padding:9px 36px;font-family:'Zen Antique Soft',serif;
  font-size:.9rem;letter-spacing:.25em;background:transparent;color:var(--gold);
  border:1px solid var(--gold);border-radius:3px;cursor:pointer;transition:all .2s;
  position:relative;z-index:1}
.stage-select-btn:hover{background:rgba(212,160,23,.1);box-shadow:0 0 14px rgba(212,160,23,.3)}
.stage-btn{display:flex;align-items:center;gap:12px;padding:10px 16px;
  background:rgba(255,255,255,.03);border:1px solid rgba(212,160,23,.2);
  border-radius:3px;cursor:pointer;transition:all .2s;pointer-events:all}
.stage-btn:hover{border-color:var(--gold);background:rgba(212,160,23,.08)}
.stage-thumb{width:48px;height:36px;border-radius:2px;flex-shrink:0;overflow:hidden;position:relative}
.stage-info .sname{font-size:.9rem;color:var(--paper);letter-spacing:.1em}
.stage-info .sdesc{font-size:.55rem;color:#666;letter-spacing:.1em;margin-top:2px;font-family:'Share Tech Mono',monospace}
.stage-info .sdiff{font-size:.55rem;letter-spacing:.1em;margin-top:2px}
.hint{font-size:.58rem;color:#444;letter-spacing:.08em;text-align:center;
  line-height:2;font-family:'Share Tech Mono',monospace}
.section-hd{font-size:.6rem;color:#555;letter-spacing:.4em;margin-top:4px}
.result-box{background:rgba(10,8,4,.9);border:1px solid rgba(212,160,23,.3);
  padding:20px 32px;border-radius:4px;text-align:center;min-width:260px}
.result-box .rank{font-size:3rem;color:var(--gold);text-shadow:0 0 20px var(--gold)}
.result-box .rtime{font-size:.8rem;color:#888;font-family:'Share Tech Mono',monospace;margin-top:4px}
.result-box .rscore{font-size:1.2rem;color:#fff;margin-top:8px;letter-spacing:.1em}

/* ── SETUP SCREEN ── */
#setupScreen{position:absolute;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:flex-start;gap:0;pointer-events:all;
  overflow-y:auto;padding:10px 0 20px;
  background:rgba(5,2,1,.96)}
#setupScreen.active{display:flex}
.setup-title{font-size:clamp(1rem,4vw,1.5rem);color:var(--gold);letter-spacing:.4em;
  text-align:center;margin:8px 0 4px;text-shadow:0 0 12px var(--gold)}
.setup-stage-name{font-size:.65rem;color:#888;letter-spacing:.3em;margin-bottom:12px;font-family:'Share Tech Mono',monospace}
.setup-section{width:min(480px,94vw);margin-bottom:12px}
.setup-sec-hd{font-size:.55rem;color:#555;letter-spacing:.5em;border-bottom:1px solid rgba(212,160,23,.15);
  padding-bottom:4px;margin-bottom:8px;font-family:'Share Tech Mono',monospace}
/* キャラカード */
.char-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.char-card{border:2px solid rgba(255,255,255,.1);border-radius:6px;padding:6px 4px;
  cursor:pointer;text-align:center;transition:all .15s;background:rgba(0,0,0,.4);
  position:relative}
.char-card:hover{border-color:rgba(212,160,23,.5);background:rgba(212,160,23,.06)}
.char-card.selected{border-color:var(--gold);background:rgba(212,160,23,.12);
  box-shadow:0 0 10px rgba(212,160,23,.3)}
.char-card canvas{display:block;margin:0 auto}
.char-card .cname{font-size:.55rem;color:var(--paper);letter-spacing:.1em;margin-top:3px}
.char-card .ctype{font-size:.45rem;color:#666;font-family:'Share Tech Mono',monospace}
.char-card .cstats{font-size:.42rem;color:#555;font-family:'Share Tech Mono',monospace;margin-top:2px}
.char-card .sel-mark{position:absolute;top:2px;right:4px;font-size:.7rem;color:var(--gold);display:none}
.char-card.selected .sel-mark{display:block}
/* 味方カード */
.ally-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.ally-card{border:2px solid rgba(255,255,255,.1);border-radius:6px;padding:6px 4px;
  cursor:pointer;text-align:center;transition:all .15s;background:rgba(0,0,0,.4);
  position:relative}
.ally-card:hover{border-color:rgba(74,170,255,.4);background:rgba(74,170,255,.05)}
.ally-card.selected{border-color:#4af;background:rgba(74,170,255,.1);
  box-shadow:0 0 8px rgba(74,170,255,.25)}
.ally-card canvas{display:block;margin:0 auto}
.ally-card .cname{font-size:.55rem;color:var(--paper);letter-spacing:.1em;margin-top:3px}
.ally-card .ctype{font-size:.42rem;color:#666;font-family:'Share Tech Mono',monospace}
.ally-card .sel-num{position:absolute;top:2px;right:4px;font-size:.65rem;color:#4af;display:none}
.ally-card.selected .sel-num{display:block}
.ally-none{border-color:rgba(255,255,255,.06)!important;opacity:.5}
.ally-limit{font-size:.48rem;color:#555;text-align:right;margin-top:3px;font-family:'Share Tech Mono',monospace}
/* 武器カード */
.wpn-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.wpn-card{border:2px solid rgba(255,255,255,.1);border-radius:6px;padding:6px 4px 5px;
  cursor:pointer;text-align:center;transition:all .15s;background:rgba(0,0,0,.4);
  position:relative}
.wpn-card:hover{border-color:rgba(100,220,100,.4);background:rgba(100,220,100,.05)}
.wpn-card.selected{border-color:#4fa;background:rgba(100,220,100,.1);
  box-shadow:0 0 8px rgba(100,220,100,.25)}
.wpn-icon{font-size:1.3rem;line-height:1;margin-bottom:2px}
.wpn-card .wname{font-size:.48rem;color:var(--paper);letter-spacing:.03em;font-weight:bold}
.wpn-card .wstats{font-size:.38rem;color:#7a9;font-family:'Share Tech Mono',monospace;margin-top:1px}
.wpn-card .wdmg{font-size:.37rem;color:#fa8;font-family:'Share Tech Mono',monospace}
.wpn-card .sel-mark{position:absolute;top:2px;right:4px;font-size:.65rem;color:#4fa;display:none}
.wpn-card.selected .sel-mark{display:block}
.setup-back-btn{padding:5px 12px;font-family:'Share Tech Mono',monospace;font-size:.55rem;
  letter-spacing:.08em;background:rgba(255,255,255,.05);color:#aaa;
  border:1px solid rgba(255,255,255,.2);border-radius:3px;cursor:pointer;
  transition:all .2s;flex-shrink:0}
.setup-back-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(212,160,23,.08)}
.setup-start-btn{margin-top:6px;padding:12px 48px;font-family:'Zen Antique Soft',serif;
  font-size:1rem;letter-spacing:.3em;background:transparent;color:var(--gold);
  border:2px solid var(--gold);border-radius:3px;cursor:pointer;transition:all .2s;width:min(480px,94vw)}
.setup-start-btn:hover,.setup-start-btn:active{background:rgba(212,160,23,.15);
  box-shadow:0 0 20px rgba(212,160,23,.3)}

/* ── MOBILE ── */
#mobileCtrl{
  position:fixed;bottom:0;left:0;right:0;
  display:none;
  flex-direction:column;gap:4px;padding:6px 8px 12px;
  pointer-events:none;
  z-index:100;
  background:linear-gradient(0deg,rgba(0,0,0,.75) 0%,transparent 100%)}
#mobileCtrl.show{display:flex;}
#mobileCtrl .cbtn{pointer-events:all;}
.ctrl-row{display:flex;justify-content:center;gap:6px;align-items:center}
.cbtn{
  border-radius:14px;border:2px solid rgba(255,255,255,.2);
  background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;
  font-size:.7rem;color:rgba(255,255,255,.5);cursor:pointer;
  user-select:none;-webkit-user-select:none;
  font-family:'Zen Antique Soft',serif;
  width:58px;height:58px;flex-shrink:0;
  transition:background .06s,border-color .06s,color .06s;}
.cbtn.sm{width:48px;height:48px;font-size:.62rem}
.cbtn.lg{width:66px;height:66px;font-size:.8rem}
.cbtn:active,.cbtn.pr{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.6);color:#fff}
.cbtn.punch{border-color:rgba(74,170,255,.5);color:rgba(100,190,255,.8)}
.cbtn.kick {border-color:rgba(255,100,60,.5); color:rgba(255,120,80,.8)}
.cbtn.throw{border-color:rgba(255,160,0,.5);  color:rgba(255,180,40,.8)}
.cbtn.sp   {border-color:rgba(212,160,23,.5); color:rgba(240,200,40,.8)}
.cbtn.guard{border-color:rgba(100,220,255,.4);color:rgba(100,220,255,.7)}
.cbtn.wpn  {border-color:rgba(100,220,100,.4);color:rgba(100,220,100,.7)}
.cbtn.heal {border-color:rgba(46,204,113,.5); color:rgba(80,220,130,.8)}
.cbtn.punch:active,.cbtn.punch.pr{background:rgba(74,170,255,.25); border-color:#4af;color:#4af}
.cbtn.kick:active, .cbtn.kick.pr {background:rgba(255,100,60,.25); border-color:#f64;color:#f64}
.cbtn.throw:active,.cbtn.throw.pr{background:rgba(255,160,0,.25);  border-color:#fa0;color:#fa0}
.cbtn.sp:active,   .cbtn.sp.pr  {background:rgba(212,160,23,.25); border-color:var(--gold);color:var(--gold)}
.cbtn.guard:active,.cbtn.guard.pr{background:rgba(100,220,255,.2);border-color:#4ef;color:#4ef}
.cbtn.wpn:active,  .cbtn.wpn.pr {background:rgba(100,220,100,.2);border-color:#4fa;color:#4fa}
.cbtn.heal:active, .cbtn.heal.pr{background:rgba(46,204,113,.2); border-color:#2ecc71;color:#2ecc71}
.dpad{display:grid;grid-template-columns:repeat(3,48px);grid-template-rows:repeat(3,48px);gap:3px}
.dpad .cbtn{width:48px;height:48px;font-size:.9rem}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <!-- HUD -->
  <div id="hud">
    <div class="hud-panel">
      <div class="hud-name" id="p-name">タケシ</div>
      <div class="bar-wrap"><div class="bar-fill hp-fill" id="p-hp" style="width:100%"></div></div>
      <div class="bar-wrap" style="margin-top:3px"><div class="bar-fill sp-fill" id="p-sp" style="width:0%"></div></div>
      <div class="sp-icons" id="sp-icons"></div>
    </div>
    <div id="hud-center">
      <div id="stage-label">STAGE 1</div>
      <div id="score-val">000000</div>
      <div id="ally-panel"></div>
    </div>
    <div class="hud-panel" id="boss-panel" style="display:none">
      <div class="hud-name" id="boss-name" style="color:#e74c3c">BOSS</div>
      <div class="bar-wrap" style="width:130px"><div class="bar-fill" id="boss-hp"
        style="width:100%;background:linear-gradient(90deg,#8b0000,#e74c3c)"></div></div>
      <div class="hud-sub" id="boss-sub">???</div>
    </div>
  </div>
  <div id="announce"></div>
  <div id="sub-announce"></div>

  <!-- TITLE SCREEN -->
  <div class="screen" id="titleScreen">
    <div class="title-bg"></div>
    <div class="ink-title" style="position:relative;z-index:1">
      族鬼列伝
      <span class="sub">ZOKKOU RETSUDEN</span>
      <span class="catch">— 喧嘩上等・天下無敵 —</span>
    </div>
    <div class="section-hd" style="position:relative;z-index:1">— ステージ選択 —</div>

    <div class="stage-carousel-wrap">
      <div class="stage-carousel"><div class="stage-cards-track" id="stageTrack"></div></div>
      <div class="carousel-nav">
        <div class="carousel-arrow" id="carPrev">◀</div>
        <div class="carousel-dots" id="carDots"></div>
        <div class="carousel-arrow" id="carNext">▶</div>
      </div>
      <div style="text-align:center;margin-top:8px;position:relative;z-index:1">
        <button class="stage-select-btn" id="stageGoBtn">このステージへ →</button>
      </div>
    </div>

    <div class="hint" style="position:relative;z-index:1;margin-top:6px">
      A/D 移動 &nbsp;｜&nbsp; W ジャンプ &nbsp;｜&nbsp; S ガード<br>
      J パンチ &nbsp;｜&nbsp; K キック &nbsp;｜&nbsp; U 投げ &nbsp;｜&nbsp; L 必殺 &nbsp;｜&nbsp; I 武器拾う
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen hidden" id="resultScreen">
    <div class="result-box">
      <div class="rank" id="res-rank">勝利</div>
      <div class="rscore" id="res-score">SCORE: 000000</div>
      <div class="rtime" id="res-time">TIME: 0:00</div>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn" onclick="goTitle()">タイトルへ</button>
      <button class="btn" onclick="retryCurrent()">もう一度</button>
    </div>
  </div>

  <!-- SETUP SCREEN -->
  <div id="setupScreen">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:2px">
      <button class="setup-back-btn" id="setupBackBtn">← ステージ選択へ</button>
      <div class="setup-title" style="margin:0">出撃準備</div>
    </div>
    <div class="setup-stage-name" id="setup-stage-name"></div>

    <div class="setup-section">
      <div class="setup-sec-hd">── キャラクター選択 ──</div>
      <div class="char-grid" id="charGrid"></div>
    </div>

    <div class="setup-section">
      <div class="setup-sec-hd">── 味方選択（最大2人） ──</div>
      <div class="ally-grid" id="allyGrid"></div>
      <div class="ally-limit" id="allyLimitTxt">選択中: 0 / 2</div>
    </div>

    <div class="setup-section">
      <div class="setup-sec-hd">── 武器選択（1つ持てる） ──</div>
      <div class="wpn-grid" id="wpnGrid"></div>
    </div>

    <button class="setup-start-btn" id="setupStartBtn">出撃！</button>
  </div>

</div><!-- end #ui -->

<!-- MOBILE（#uiの外・独立） -->
<div id="mobileCtrl">
  <div class="ctrl-row" style="justify-content:space-between;align-items:flex-end">
    <div class="dpad">
      <div></div><div class="cbtn" id="bU">↑</div><div></div>
      <div class="cbtn" id="bL">◀</div><div></div><div class="cbtn" id="bR">▶</div>
      <div></div><div class="cbtn" id="bDn">↓</div><div></div>
    </div>

      c2.strokeStyle='rgba(80,140,255,0.3)';c2.lineWidth=1;
      for(var ri=0;ri<8;ri++){c2.beginPath();c2.moveTo(ri*15,ri*5);c2.lineTo(ri*15+3,ri*5+10);c2.stroke();}
      c2.fillStyle='rgba(40,80,160,0.5)';c2.fillRect(0,h*0.48,w,h*0.14);
      c2.strokeStyle='rgba(100,160,255,0.3)';
      for(var rw=0;rw<3;rw++){c2.beginPath();c2.moveTo(0,h*0.5+rw*4);c2.lineTo(w,h*0.5+rw*4);c2.stroke();}
    } else if(s.bgType==='yakuza'){
      // 極道本家：金屏風・黒塗り車
      c2.fillStyle='rgba(212,160,23,0.15)';c2.fillRect(0,0,w,h*0.58);
      for(var yi=0;yi<5;yi++){c2.strokeStyle='rgba(212,160,23,0.3)';c2.lineWidth=1;c2.beginPath();c2.moveTo(yi*24,0);c2.lineTo(yi*24,h*0.58);c2.stroke();}
      c2.fillStyle='#0a0808';c2.fillRect(10,h*0.36,50,20);c2.fillRect(70,h*0.38,40,18); // 車
    } else if(s.bgType==='freezer'){
      // 冷凍倉庫：氷・白息
      c2.fillStyle='rgba(136,200,255,0.08)';c2.fillRect(0,0,w,h*0.6);
      for(var fz=0;fz<6;fz++){c2.fillStyle='rgba(180,220,255,0.4)';c2.fillRect(fz*18+4,10+fz%3*8,10,6);}
      c2.strokeStyle='rgba(180,220,255,0.25)';c2.lineWidth=1;
      for(var fzr=0;fzr<4;fzr++){c2.beginPath();c2.moveTo(0,fzr*14+10);c2.lineTo(w,fzr*14+10);c2.stroke();}
    } else if(s.bgType==='deadpark'){
      // 廃遊園地：観覧車
      c2.strokeStyle='rgba(255,51,136,0.4)';c2.lineWidth=1.5;
      c2.beginPath();c2.arc(w*0.75,h*0.3,20,0,Math.PI*2);c2.stroke();
      for(var dp=0;dp<6;dp++){var da=dp*Math.PI/3;c2.beginPath();c2.moveTo(w*0.75,h*0.3);c2.lineTo(w*0.75+Math.cos(da)*20,h*0.3+Math.sin(da)*20);c2.stroke();}
      c2.fillStyle='rgba(255,51,136,0.5)';c2.fillRect(8,h*0.38,18,16);
    } else if(s.bgType==='train'){
      // 貨物列車：レール・車両
      c2.strokeStyle='#888';c2.lineWidth=2;
      c2.beginPath();c2.moveTo(0,h*0.5);c2.lineTo(w,h*0.5);c2.stroke();
      c2.beginPath();c2.moveTo(0,h*0.54);c2.lineTo(w,h*0.54);c2.stroke();
      for(var tr=0;tr<6;tr++){c2.fillStyle='#222';c2.fillRect(tr*18,h*0.48,14,8);}
      c2.fillStyle='#181818';c2.fillRect(5,h*0.32,40,h*0.18);c2.fillRect(55,h*0.3,35,h*0.2);
    } else if(s.bgType==='ugarena'){
      // 地下闘技場：スポットライト
      c2.fillStyle='rgba(255,102,0,0.18)';
      c2.beginPath();c2.moveTo(w/2,0);c2.lineTo(w/2-30,h*0.6);c2.lineTo(w/2+30,h*0.6);c2.fill();
      c2.strokeStyle='rgba(255,102,0,0.5)';c2.lineWidth=2;
      c2.beginPath();c2.arc(w/2,h*0.55,18,0,Math.PI*2);c2.stroke();
    } else if(s.bgType==='collapse'){
      // 崩壊ビル：飛散する瓦礫
      c2.fillStyle='#1a1208';c2.fillRect(20,4,30,h*0.5);c2.fillRect(60,10,25,h*0.44);
      c2.fillStyle='rgba(255,68,0,0.5)';
      for(var cb=0;cb<6;cb++){c2.beginPath();c2.arc(cb*16+5,cb*8+5,4,0,Math.PI*2);c2.fill();}
    } else if(s.bgType==='skytemple'){
      // 天空神殿：雲・柱
      c2.fillStyle='rgba(170,136,255,0.15)';
      for(var st2=0;st2<4;st2++){c2.beginPath();c2.ellipse(st2*28+14,h*0.2,14,8,0,0,Math.PI*2);c2.fill();}
      c2.fillStyle='rgba(170,136,255,0.4)';
      for(var sp=0;sp<4;sp++){c2.fillRect(sp*24+8,h*0.28,8,h*0.32);}
    }
    // 地面
    c2.fillStyle=p.ground;c2.fillRect(0,h*0.6,w,h*0.4);
    // ボスアクセント
    c2.fillStyle=p.accent||'#d4a017';
    c2.fillRect(0,h*0.58,w,3);
  }

  // カード生成
  STAGES.forEach(function(s,i){
    var card=document.createElement('div');
    card.className='stage-card'+(i===0?' active':'');
    // プレビューキャンバス
    var prev=document.createElement('div');prev.className='stage-card-preview';
    var cv=document.createElement('canvas');cv.width=300;cv.height=90;
    drawStagePreview(cv,s);
    // ステージ番号バッジ
    var badge=document.createElement('div');
    badge.style.cssText='position:absolute;top:6px;left:8px;font-size:.55rem;'+
      'color:var(--gold);font-family:"Share Tech Mono",monospace;letter-spacing:.15em;'+
      'text-shadow:0 1px 4px #000;z-index:2';
    badge.textContent='STAGE '+(i+1);
    if(s.isSurvival){badge.style.color='#ff2200';}
    prev.appendChild(cv);prev.appendChild(badge);
    // 難易度バー
    var diffBar=document.createElement('div');
    diffBar.style.cssText='position:absolute;bottom:0;left:0;right:0;height:3px;background:'+
      (s.palette.accent||'#d4a017')+';opacity:0.7';
    prev.appendChild(diffBar);
    card.appendChild(prev);
    // テキスト情報
    var body=document.createElement('div');body.className='stage-card-body';
    body.innerHTML=
      '<div class="stage-card-name">'+s.name+'</div>'+
      '<div class="stage-card-desc">'+s.desc+'</div>'+
      '<div class="stage-card-diff" style="color:'+(s.palette.accent||'#d4a017')+'">難易度 '+s.diff+'</div>'+
      '<div class="stage-card-boss">BOSS: '+s.bossName+' 〈'+s.bossTitle+'〉</div>';
    card.appendChild(body);
    // タップでそのままセットアップへ（ダブルタップ的）
    card.addEventListener('click',function(){
      if(carIdx===i){openSetup(s.id);}
      else{carMoveTo(i);}
    });
    track.appendChild(card);

    // ドット
    var dot=document.createElement('div');
    dot.className='carousel-dot'+(i===0?' on':'');
    dot.addEventListener('click',function(){carMoveTo(i);});
    dotsEl.appendChild(dot);
  });

  function carMoveTo(idx){
    carIdx=idx;
    var cardW=track.children[0]?track.children[0].offsetWidth+16:280;
    // 中央寄せオフセット計算
    var wrap=document.querySelector('.stage-carousel');
    var centerOff=(wrap.offsetWidth-cardW)/2;
    track.style.transform='translateX('+( centerOff - idx*cardW )+'px)';
    // アクティブ更新
    Array.from(track.children).forEach(function(c,i){
      c.classList.toggle('active',i===idx);
    });
    Array.from(dotsEl.children).forEach(function(d,i){
      d.classList.toggle('on',i===idx);
    });
  }
  // 初期位置
  setTimeout(function(){carMoveTo(0);},50);

  // 矢印
  document.getElementById('carPrev').addEventListener('click',function(){
    carMoveTo(Math.max(0,carIdx-1));
  });
  document.getElementById('carNext').addEventListener('click',function(){
    carMoveTo(Math.min(STAGES.length-1,carIdx+1));
  });

  // 「このステージへ」ボタン
  document.getElementById('stageGoBtn').addEventListener('click',function(){
    openSetup(STAGES[carIdx].id);
  });

  // スワイプ対応
  var swipeX0=null;
  var carEl=document.querySelector('.stage-carousel');
  carEl.addEventListener('touchstart',function(e){swipeX0=e.touches[0].clientX;},{passive:true});
  carEl.addEventListener('touchend',function(e){
    if(swipeX0===null)return;
    var dx=e.changedTouches[0].clientX-swipeX0;
    if(Math.abs(dx)>40){dx<0?carMoveTo(Math.min(STAGES.length-1,carIdx+1)):carMoveTo(Math.max(0,carIdx-1));}
    swipeX0=null;
  });
  // キー左右でも動かせる（タイトル画面のみ）
  document.addEventListener('keydown',function(e){
    if(gameMode!=='title')return;
    if(e.code==='ArrowRight'||e.code==='KeyD')carMoveTo(Math.min(STAGES.length-1,carIdx+1));
    if(e.code==='ArrowLeft' ||e.code==='KeyA')carMoveTo(Math.max(0,carIdx-1));
    if(e.code==='Enter'||e.code==='Space')openSetup(STAGES[carIdx].id);
  });
})();
