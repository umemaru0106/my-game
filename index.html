// ═══════════════════════════════════════
//  FIGHTER CLASS
// ═══════════════════════════════════════
var GY; // ground Y, set each frame
var GRAV=0.55;
var fighters=[],player,allies=[],enemies=[];
var wDrops=[]; // dropped weapons on ground
var scrollX=0; // world scroll
var stageWidth=2400;

function Fighter(def,x,groundY){
  this.def=def;
  this.x=x; this.y=groundY||400;
  this.gy=groundY||400; // this fighter's ground reference
  this.vx=0; this.vy=0;
  this.facing=1;
  this.hp=def.hp; this.maxHp=def.hp;
  this.sp=0; this.maxSp=def.maxSp||0;
  this.spCharges=0;
  this.state='idle'; this.stateT=0;
  this.hitCD=0;
  this.combo=0; this.comboT=0;
  this.animT=0; this.animF=0;
  this.weapon=null; this.wUses=0;
  this.blocking=false;
  this.knockT=0;
  this.stunT=0;
  this.dead=false;
  this.score=def.score||0;
  this.isPlayer=def===CHAR_DEFS.player;
  this.isAlly=!!def.isAlly;
  this.isEnemy=!!def.isEnemy;
  this.isBoss=!!def.isBoss;
  // AI state
  this.aiTargetX=x;
  this.aiAttackCD=0;
  this.aiThinkT=0;
  this.aiTarget=null;
  // aura
  this.auraT=0;
  this.auraPulse=0;
}
Fighter.prototype.isGrounded=function(){return this.y>=this.gy-1;};
Fighter.prototype.useSpecial=function(targets){
  if(this.spCharges<=0) return;
  this.spCharges--;
  this.state='special';this.stateT=40;
  this.auraT=60;
  var sc=this.def.specialCol||'#f1c40f';
  var sp=this.def.special||'必殺技';

  // キャラ別発動エフェクト
  if(sp==='百裂拳'||sp==='神速連打'){
    // 連打系：細かいパーティクル大量
    for(var i=0;i<5;i++) burst(this.x+(i-2)*12,this.y-30,sc,20,true);
    shake(10);
  } else if(sp==='岩砕き'||sp==='鬼神拳'||sp==='鬼母拳'){
    // 一撃系：大爆発
    burst(this.x,this.y-35,sc,40,true);
    burst(this.x,this.y-20,'#fff',20,true);
    shake(22);
  } else if(sp==='乱舞'||sp==='双竜脚'||sp==='流星蹴'){
    // 回転系：リング状
    for(var ri=0;ri<8;ri++){
      var ra=ri/8*Math.PI*2;
      burst(this.x+Math.cos(ra)*25,this.y-30+Math.sin(ra)*12,sc,8,true);
    }
    shake(14);
  } else {
    burst(this.x,this.y-20,sc,28,true);
    shake(14);
  }

  ann(sp,sc,'');
  // 全敵にヒット判定
  var self=this;
  targets.forEach(function(t){
    if(dist(self,t)<90&&!t.dead){
      t.hp=Math.max(0,t.hp-self.def.katk*2.5);
      t.knockT=40;t.vx=self.facing*8;t.vy=-6;
      t.state='hurt';t.stateT=35;
      burst(t.x,t.y-25,'#fff',16,true);
      score+=Math.floor(self.def.katk*2.5)*3;
    }
  });
  updateSpUI();
};

// ═══════════════════════════════════════
//  PLAYER INPUT
// ═══════════════════════════════════════
var _atkPr=false,_katkPr=false,_spPr=false,_thrPr=false,_jumpPr=false,_wpnPr=false;
function playerInput(){
  if(!player||player.dead) return;
  if(['hurt','special','ko'].includes(player.state)) return;
  var L  = K['KeyA']||K['ArrowLeft'] ||mb.L;
  var R  = K['KeyD']||K['ArrowRight']||mb.R;
  var J  = K['KeyW']||K['ArrowUp']   ||mb.U;
  var A  = K['KeyJ']||mb.atk;        // パンチ（IRON FIST: J）
  var KA = K['KeyK']||mb.katk;       // キック（IRON FIST: K）
  var TH = K['KeyU']||mb.thr;        // 投げ  （IRON FIST: U）
  var SP = K['KeyL']||mb.sp;         // 必殺技（IRON FIST: L）
  var GD = K['KeyS']||mb.guard;      // ガード（IRON FIST: S）
  var WP = K['KeyI']||mb.wpnpick;    // 武器拾う（Iキー）
  var gr = player.isGrounded();

  if(L){player.vx=-player.def.spd; player.facing=-1;}
  else if(R){player.vx=player.def.spd; player.facing=1;}
  else player.vx*=0.8;

  if(J&&!_jumpPr&&gr){player.vy=player.def.jumpV; player.state='jump';}
  _jumpPr=J;

  // ガード（Sキー専用、移動と分離）
  if(GD&&gr&&(player.state==='idle'||player.state==='walk'||player.state==='block')){
    player.blocking=true; player.state='block'; player.vx=0; return;
  }
  if(!GD&&player.state==='block'){player.state='idle';}
  player.blocking=(player.state==='block');

  if(player.state==='idle'||player.state==='walk'||player.state==='jump'
     ||player.state==='atk'||player.state==='katk'){
    // 必殺技
    if(SP&&!_spPr){player.useSpecial(enemies);} _spPr=SP;
    // 投げ（近距離の敵に）
    if(TH&&!_thrPr&&gr){
      var tgt=null;
      enemies.forEach(function(e){if(!e.dead&&Math.abs(e.x-player.x)<60&&Math.abs(e.y-player.y)<30) tgt=e;});
      if(tgt){
        player.state='katk'; player.stateT=28; _thrPr=true;
        tgt.knockT=50; tgt.vx=player.facing*9; tgt.vy=-7;
        tgt.state='hurt'; tgt.stateT=40;
        tgt.hp=Math.max(0,tgt.hp-30);
        burst(tgt.x,tgt.y-25,'#fa0',14,true); shake(10);
        ann('投げ！','#fa0'); score+=80;
        if(tgt.hp<=0) onKO(tgt,player);
      }
    } else if(!TH) _thrPr=false;
    // キック（強攻撃）/ ジャンプ中はジャイアントスイング
    if(KA&&!_katkPr){
      if(!gr){
        // ── ジャイアントスイング（空中つかみ投げ）──
        var swingTgt=null;
        enemies.forEach(function(e){
          if(!e.dead&&Math.abs(e.x-player.x)<80&&Math.abs(e.y-player.y)<50) swingTgt=e;
        });
        if(swingTgt){
          player.state='gswing'; player.stateT=50; _katkPr=true;
          player.swingTarget=swingTgt;
          swingTgt.state='hurt'; swingTgt.stateT=55;
          swingTgt.vx=0; swingTgt.vy=0;
          ann('ジャイアントスイング！','#f1c40f','豪快！');
          shake(6);
        } else {
          // 敵いなければ普通のキック
          player.state='katk'; player.stateT=22; _katkPr=true;
          doAttack(player,enemies,player.def.katk,55,true);
        }
      } else {
        player.state='katk'; player.stateT=22; _katkPr=true;
        doAttack(player,enemies,player.def.katk,55,true);
      }
    } else if(!KA) _katkPr=false;
    // パンチ
    if(A&&!_atkPr){
      player.state='atk'; player.stateT=14; _atkPr=true;
      doAttack(player,enemies,player.def.atk,42,false);
    } else if(!A) _atkPr=false;
    // 武器拾う（Iキー）
    if(WP&&!_wpnPr) pickupOrUseWeapon(player,enemies);
    _wpnPr=WP;
  }

  // 攻撃モーション中も移動で向き・アニメを上書き（ただしstateは維持）
  if(gr&&(L||R)&&(player.state==='atk'||player.state==='katk')){
    // 移動速度を攻撃中は少し落とす（0.6倍）
    player.vx*=0.6;
  }

  if(gr&&(L||R)&&player.state!=='block'&&player.state!=='atk'&&player.state!=='katk'&&player.state!=='special') player.state='walk';
  if(gr&&!L&&!R&&player.state==='walk') player.state='idle';
}

function doAttack(attacker,targets,dmg,range,heavy){
  var hit=false;
  targets.forEach(function(t){
    if(t.dead) return;
    var dx=t.x-attacker.x;
    var dy=t.y-attacker.y;
    // 当たり判定：前方向に範囲内、Y軸は緩め
    var inRange=Math.abs(dx)<range&&Math.abs(dy)<50;
    var inFront=dx*attacker.facing>-(range*0.4); // 後ろ側も少し当たる
    if(!inRange||!inFront) return;
    if(t.hitCD>0) return;
    var wd=attacker.weapon?WEAPONS[attacker.weapon]:null;
    var finalDmg=Math.round(dmg*(wd?wd.dmg:1));
    if(t.blocking) finalDmg=Math.floor(finalDmg*0.15);
    t.hp=Math.max(0,t.hp-finalDmg);
    t.hitCD=heavy?28:16;
    t.vx=attacker.facing*(heavy?5:3);
    t.vy=heavy?-4:-2;
    t.state='hurt'; t.stateT=heavy?20:12;
    if(!t.blocking){t.combo=(t.combo||0)+1; t.comboT=70;}
    if(wd){
      if(attacker.wUses===undefined) attacker.wUses=wd.uses; // 念のため初期化
      attacker.wUses--;
      if(attacker.wUses<=0){
        if(attacker.weapon&&WEAPONS[attacker.weapon]) wDrops.push({x:attacker.x,y:attacker.y,type:attacker.weapon});
        attacker.weapon=null;
        wd=null; // nullにしてから後続参照を防ぐ
      }
    }
    burst(t.x,t.y-20,heavy?'#f1c40f':'#e74c3c',heavy?14:8,heavy);
    if(heavy){shake(10);spark2(t.x,t.y-20,8);}else shake(4);
    if(attacker.isPlayer){
      score+=finalDmg*2;
      attacker.sp=Math.min(100,attacker.sp+8);
      if(attacker.sp>=100&&attacker.spCharges<(attacker.def.maxSp||0)){
        attacker.spCharges++; attacker.sp=0; updateSpUI();
        ann('必殺ゲージ！','#f1c40f');
      }
      updateHUD();
    }
    hit=true;
    if(t.hp<=0) onKO(t,attacker);
  });
  if(hit&&attacker.weapon&&WEAPONS[attacker.weapon]){
    spark2(attacker.x+attacker.facing*20,attacker.y-25,5);
  }
}

function onKO(fighter,killer){
  fighter.state='ko';fighter.stateT=999;fighter.dead=true;
  fighter.vy=-5;fighter.vx=(killer?killer.facing:1)*3;
  burst(fighter.x,fighter.y-20,'#e74c3c',20,true);shake(12);
  score+=fighter.score||0;
  if(fighter.weapon&&WEAPONS[fighter.weapon]) wDrops.push({x:fighter.x,y:fighter.y,type:fighter.weapon});
  fighter.weapon=null;
  // 回復アイテムドロップ
  if(fighter.isBoss) tryDropHealBoss(fighter.x,fighter.y);
  else tryDropHeal(fighter.x,fighter.y);
  if(fighter.isBoss) onBossKO(fighter);
  updateHUD();
}

function pickupOrUseWeapon(f,targets){
  if(pickupHeal(f)) return;
  if(!f.weapon){
    var best=null,bestD=60;
    wDrops.forEach(function(d){
      if(!WEAPONS[d.type]) return; // 不正キー除外
      var dd=dist(f,{x:d.x,y:d.y});
      if(dd<bestD){bestD=dd;best=d;}
    });
    if(best&&WEAPONS[best.type]){
      f.weapon=best.type;f.wUses=WEAPONS[best.type].uses;
      wDrops.splice(wDrops.indexOf(best),1);
      ann(WEAPONS[best.type].label+'GET！','#4fa');
    }
  } else {
    var fw=WEAPONS[f.weapon];
    if(fw) doAttack(f,targets,fw.dmg*f.def.atk*0.8,fw.reach+30,false);
    else f.weapon=null; // 不正キーをクリア
  }
}

// ═══════════════════════════════════════
//  ALLY AI
// ═══════════════════════════════════════
function allyAI(ally){
  if(ally.dead||ally.state==='hurt'||ally.state==='ko') return;
  var gr=ally.isGrounded();

  // 近くに武器or回復アイテムがあれば拾う
  if(gr&&ally.aiAttackCD<=0){
    if(pickupHeal(ally)){ally.aiAttackCD=20;return;}
    if(!ally.weapon){
      var bw=null,bwd=60;
      wDrops.forEach(function(d){var dd=dist(ally,{x:d.x,y:d.y});if(dd<bwd){bwd=dd;bw=d;}});
      if(bw&&WEAPONS[bw.type]){ally.weapon=bw.type;ally.wUses=WEAPONS[bw.type].uses;wDrops.splice(wDrops.indexOf(bw),1);}
      else if(bw&&!WEAPONS[bw.type]) wDrops.splice(wDrops.indexOf(bw),1); // 不正キーはドロップから除去
    }
  }

  // find nearest enemy
  var tgt=null,bestD=Infinity;
  enemies.forEach(function(e){
    if(e.dead) return;
    var d2=dist(ally,e);
    if(d2<bestD){bestD=d2;tgt=e;}
  });
  if(!tgt){ally.vx*=0.8;return;}
  var dx=tgt.x-ally.x;
  ally.facing=dx>0?1:-1;
  var allyWd=ally.weapon&&WEAPONS[ally.weapon]?WEAPONS[ally.weapon]:null;
  if(!allyWd) ally.weapon=null; // 不正な武器キーをクリア
  var range=allyWd?allyWd.reach+30:35;
  if(Math.abs(dx)>range){
    ally.vx=ally.facing*ally.def.spd*0.9;
    if(gr) ally.state='walk';
  } else {
    ally.vx=0;
    if(gr) ally.state='idle';
    if(ally.aiAttackCD<=0&&gr){
      var useHeavy=Math.random()<0.3;
      if(allyWd){
        ally.state='atk'; ally.stateT=16;
        doAttack(ally,[tgt],allyWd.dmg*ally.def.atk*0.9,allyWd.reach+30,false);
        if(ally.wUses===undefined) ally.wUses=allyWd.uses;
        ally.wUses--;
        if(ally.wUses<=0){wDrops.push({x:ally.x,y:ally.y,type:ally.weapon});ally.weapon=null;}
        ally.aiAttackCD=28;
      } else {
        ally.state=useHeavy?'katk':'atk';
        ally.stateT=useHeavy?22:14;
        doAttack(ally,[tgt],useHeavy?ally.def.katk:ally.def.atk,useHeavy?50:40,useHeavy);
        ally.aiAttackCD=useHeavy?50:32;
      }
    }
  }
  if(ally.aiAttackCD>0) ally.aiAttackCD--;
  if(Math.random()<0.003&&gr) ally.vy=ally.def.jumpV;
}

// ═══════════════════════════════════════
//  ENEMY AI
// ═══════════════════════════════════════
function enemyAI(e){
  if(e.dead||e.state==='hurt'||e.state==='ko') return;
  // find target: player or ally
  var targets=[player].concat(allies).filter(function(f){return f&&!f.dead;});
  if(!targets.length){e.vx*=0.8;return;}
  var tgt=targets[rnd(targets.length)];
  // occasionally retarget closest
  if(Math.random()<0.02){
    var bd=Infinity;
    targets.forEach(function(t){var d2=dist(e,t);if(d2<bd){bd=d2;tgt=t;}});
    e.aiTarget=tgt;
  }
  if(e.aiTarget&&!e.aiTarget.dead) tgt=e.aiTarget;
  var dx=tgt.x-e.x,dy=tgt.y-e.y;
  e.facing=dx>0?1:-1;
  var gr=e.isGrounded();
  var range=e.isBoss?70:45;
  if(Math.abs(dx)>range||Math.abs(dy)>30){
    e.vx=e.facing*e.def.spd*(e.isBoss?1.1:0.9);
    var dvY=dy>0?0.6:-0.6;
    e.y=clamp(e.y+dvY,e.gy-60,e.gy);
    if(gr) e.state='walk';
  } else {
    e.vx=0;if(gr) e.state='idle';
    if(e.aiAttackCD<=0){
      var heavy=e.isBoss?Math.random()<0.45:Math.random()<0.25;
      e.state=heavy?'katk':'atk';e.stateT=heavy?24:16;
      doAttack(e,[tgt],heavy?e.def.katk:e.def.atk,heavy?60:46,heavy);
      e.aiAttackCD=e.isBoss?33:(heavy?47:30)+rnd(18);
    }
  }
  if(e.aiAttackCD>0) e.aiAttackCD--;
  // Boss special: if hp< 30% go berserk
  if(e.isBoss&&e.hp<e.maxHp*0.4&&Math.random()<0.002){
    e.state='special';e.stateT=35;e.auraT=40;
    burst(e.x,e.y-25,e.def.col,20,true);shake(10);
    doAttack(e,[tgt],e.def.katk*2,80,true);
    ann('ボス激怒！','#c0392b','全力で来る！');
  }
}

// ═══════════════════════════════════════
//  PHYSICS UPDATE
// ═══════════════════════════════════════
function updateGSwing(f){
  // ジャイアントスイング中：敵を周回させて最後に投げ飛ばす
  if(f.state!=='gswing') return;
  var tgt=f.swingTarget;
  if(!tgt||tgt.dead){f.state='idle';return;}
  var progress=1-(f.stateT/50); // 0→1
  var angle=progress*Math.PI*3*f.facing; // 1.5回転
  var radius=40;
  tgt.x=f.x+Math.cos(angle)*radius;
  tgt.y=f.y-20+Math.sin(angle)*radius*0.4;
  tgt.state='hurt'; tgt.stateT=3;
  // 最後のフレームで投げ飛ばす
  if(f.stateT===1){
    var throwDmg=Math.floor(f.def.katk*2.5);
    tgt.hp=Math.max(0,tgt.hp-throwDmg);
    tgt.vx=f.facing*14; tgt.vy=-10;
    tgt.knockT=60; tgt.state='hurt'; tgt.stateT=60;
    burst(tgt.x,tgt.y-20,'#f1c40f',22,true); shake(16);
    ann('SMASH!!','#f1c40f','-'+throwDmg);
    score+=Math.floor(throwDmg)*3;
    if(tgt.hp<=0) onKO(tgt,f);
    f.swingTarget=null;
    // 投げた敵が他の敵に当たる（連鎖）
    enemies.forEach(function(e){
      if(!e.dead&&e!==tgt&&Math.abs(e.x-tgt.x)<60){
        e.hp=Math.max(0,e.hp-Math.floor(throwDmg*0.5));
        e.vx=f.facing*7; e.vy=-5;
        e.state='hurt'; e.stateT=30;
        if(e.hp<=0) onKO(e,f);
      }
    });
  }
}

function updateFighter(f){
  if(f.dead){
    f.vy+=GRAV;f.x+=f.vx;f.y+=f.vy;
    f.vx*=0.92;
    if(f.y>f.gy+80) f.y=f.gy+80; // sink off screen
    return;
  }
  // timers
  if(f.stateT>0){f.stateT--;if(f.stateT<=0&&f.state!=='ko'&&f.state!=='hurt'&&f.state!=='gswing') f.state='idle';}
  if(f.hitCD>0) f.hitCD--;
  if(f.comboT>0){f.comboT--;if(!f.comboT)f.combo=0;}
  if(f.knockT>0) f.knockT--;
  if(f.stunT>0){f.stunT--;if(!f.stunT) f.state='idle';}
  if(f.auraT>0){f.auraT--;f.auraPulse+=0.25;}
  f.animT++;if(f.animT>6){f.animT=0;f.animF=(f.animF+1)%8;}

  // gravity
  f.vy+=GRAV;
  f.x+=f.vx;f.y+=f.vy;
  // ground
  if(f.y>=f.gy){f.y=f.gy;f.vy=0;if(f.state==='jump')f.state='idle';}
  if(f.state==='hurt'&&f.stateT<=0) f.state='idle';
  // clamp to stage
  var minX=scrollX+f.def.w,maxX=scrollX+W-f.def.w;
  f.x=clamp(f.x,minX,maxX);
  // depth clamp
  f.gy=clamp(f.gy,H*0.55,H*0.88);
}

// ═══════════════════════════════════════
//  DRAW FIGHTER (pixel-art style)
// ═══════════════════════════════════════
function drawFighter(f){
  if(f.dead&&f.y>f.gy+60) return;
  var wx=f.x-scrollX;
  var wy=f.y;
  var SZ=f.def.w>22?3.5:3;
  ctx.save();
  ctx.translate(wx,wy);

  // aura
  if(f.auraT>0){
    var ap=0.4+0.3*Math.sin(f.auraPulse);
    ctx.shadowColor=f.def.col;ctx.shadowBlur=20+Math.sin(f.auraPulse)*8;
    ctx.strokeStyle='rgba('+hexRgb(f.def.col)+','+ap+')';ctx.lineWidth=3;
    ctx.beginPath();ctx.ellipse(0,-f.def.h*0.5,f.def.w+8,f.def.h*0.55,0,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
  }

  // shadow on ground
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();ctx.ellipse(0,2,f.def.w*0.7,4,0,0,Math.PI*2);ctx.fill();

  if(f.state==='ko'||f.dead){
    // fallen sprite
    ctx.save();ctx.rotate(f.facing*Math.PI/2);
    drawCharBody(f,SZ,true);
    ctx.restore();ctx.restore();return;
  }

  if(f.facing===-1) ctx.scale(-1,1);
  drawCharBody(f,SZ,false);
  ctx.restore();

  // combo text
  if(f.combo>=2&&f.comboT>0&&f.isPlayer){
    ctx.save();ctx.translate(wx,wy-f.def.h-20);
    ctx.font='bold 11px "Zen Antique Soft"';
    ctx.fillStyle='#f1c40f';ctx.textAlign='center';
    ctx.fillText(f.combo+' HIT!',0,0);ctx.restore();
  }
  // HP bar above enemy/boss
  if(f.isEnemy&&!f.dead){
    ctx.save();ctx.translate(wx,wy-f.def.h-14);
    var bw=f.def.w*2.2;
    ctx.fillStyle='#1a1008';ctx.fillRect(-bw/2,0,bw,5);
    ctx.fillStyle=f.isBoss?'#c0392b':'#e74c3c';
    ctx.fillRect(-bw/2,0,bw*(f.hp/f.maxHp),5);
    ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=1;
    ctx.strokeRect(-bw/2,0,bw,5);
    ctx.restore();
  }
}

function drawCharBody(f,SZ,fallen){
  var col=f.def.col, col2=f.def.col2||'#f5e8c8';
  var hair=f.def.hairCol||'#1a1008';
  var h=f.def.h, w=f.def.w;
  var hurt=(f.state==='hurt');
  if(hurt) col='#888';

  var st=f.state;
  var t=f.stateT||0; // 残り時間（大きいほど攻撃直後）
  var isJump=st==='jump';
  var isKick=st==='katk';
  var isPunch=st==='atk';
  var isFlyKick=isKick&&isJump; // ジャンプ中のキック＝飛び蹴り
  var isWalk=st==='walk';
  var isBlock=st==='block';
  var isSpecial=st==='special';

  // 攻撃アニメ進行度 0→1
  var atkProgress=isKick||isPunch ? Math.max(0,(1-(t/22))) : 0;

  var bobY=(!fallen&&isWalk)?Math.sin(f.animF*0.8)*1.5:0;

  if(fallen){
    ctx.fillStyle=col;
    ctx.fillRect(-h*0.4,-w/2,h*0.72,w);
    ctx.fillStyle=col2;
    ctx.beginPath();ctx.arc(-h*0.5,0,w*0.42,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=hair;
    ctx.beginPath();ctx.ellipse(-h*0.58,0,w*0.38,w*0.28,0,0,Math.PI*2);ctx.fill();
    return;
  }

  // ── ジャイアントスイング / gswingモーション ──
  var isGSwing=st==='gswing';
  if(isGSwing||isFlyKick){
    var gp=1-(t/50); // 進行度 0→1
    var swingAngle=gp*Math.PI*3*(f.facing||1);

    // 体を少し前傾・腰を落とす
    ctx.save();
    ctx.rotate(-0.15*Math.sin(swingAngle));

    // 両足（踏ん張り）
    ctx.fillStyle='#2a1a08';
    ctx.fillRect(-w*0.4,0,w*0.35,h*0.28);
    ctx.fillRect(w*0.05,0,w*0.35,h*0.28);

    // 胴体
    ctx.fillStyle=col;
    ctx.beginPath();ctx.roundRect(-w/2,-h*0.72,w,h*0.44,2);ctx.fill();
    drawOutfit(f,w,h,0,col);

    // 両腕を大きく広げて振り回す
    var armSwing=Math.sin(swingAngle)*18;
    ctx.fillStyle=col;
    ctx.fillRect(-w/2-8+armSwing,-h*0.72,10,h*0.32); // 左腕
    ctx.fillRect(w/2-2-armSwing,-h*0.72,10,h*0.32);  // 右腕

    // 振り回し中の回転エフェクト（軌跡円）
    if(gp>0.1){
      ctx.strokeStyle='rgba(241,196,15,'+(gp*0.5)+')';ctx.lineWidth=2;
      ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.arc(0,-h*0.3,42,0,Math.PI*2);ctx.stroke();
      ctx.setLineDash([]);
    }

    ctx.restore();

    // 頭
    ctx.fillStyle=col2;
    ctx.beginPath();ctx.arc(0,-h*0.82,w*0.44,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=hurt?'#e74c3c':'#1a1008';ctx.fillRect(4,-h*0.85,4,4);
    drawHair(f,w,h,hair,0);

    // 投げ寸前の集中線（gp>0.8）
    if(gp>0.8){
      var flash=(gp-0.8)*5;
      ctx.strokeStyle='rgba(255,220,50,'+flash*0.7+')';ctx.lineWidth=2;
      for(var li2=0;li2<8;li2++){
        var la=li2/8*Math.PI*2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(la)*20,Math.sin(la)*20-h*0.4);
        ctx.lineTo(Math.cos(la)*50,Math.sin(la)*50-h*0.4);
        ctx.stroke();
      }
    }
    return;
  }

  // ── 通常キックモーション ──
  if(isKick&&!isJump){
    var kick2=Math.sin(Math.min(Math.PI,atkProgress*Math.PI)); // 0→1→0の弧
    // 軸足
    ctx.fillStyle='#2a1a08';
    ctx.fillRect(-w/2*0.5,-bobY,w*0.38,h*0.28);
    // 蹴り足（前に振り上げる）
    ctx.save();
    ctx.translate(w*0.12,-bobY);
    ctx.rotate(-kick2*1.2); // 後ろから前へ
    ctx.fillRect(-w*0.15,0,w*0.36,h*0.15);
    ctx.fillRect(-w*0.15,h*0.15,w*0.36,h*0.16);
    // 靴先（光る）
    ctx.fillStyle='#111';
    ctx.fillRect(-w*0.18,h*0.29,w*0.4,h*0.09);
    if(kick2>0.5){
      ctx.fillStyle='rgba(255,200,50,0.6)';
      ctx.beginPath();ctx.arc(w*0.24,h*0.3,6,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
    // 体
    ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=f.auraT>0?8:0;
    ctx.save();ctx.rotate(kick2*0.18);
    ctx.beginPath();ctx.roundRect(-w/2,-h*0.72-bobY,w,h*0.44,2);ctx.fill();
    drawOutfit(f,w,h,bobY,col);
    ctx.restore();
    ctx.shadowBlur=0;
    // 腕
    ctx.fillStyle=col;
    ctx.fillRect(-w/2-6,-h*0.7-bobY,8,h*0.3);
    ctx.fillRect(w/2-2,-h*0.7-bobY,8,h*0.3);
    // 頭
    ctx.fillStyle=col2;
    ctx.beginPath();ctx.arc(0,-h*0.82-bobY,w*0.44,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=hurt?'#fff':'#1a1008';ctx.fillRect(4,-h*0.85-bobY,4,4);
    drawHair(f,w,h,hair,bobY);
    if(f.weapon) drawWeaponOnFighter(f,w,h,bobY);
    return;
  }

  // ── 通常 (idle/walk/jump/punch/block/hurt/special) ──

  // Legs
  var legL=0, legR=0;
  if(isWalk){ legL=Math.sin(f.animF*0.8)*10; legR=-legL; }
  if(isBlock){ legL=4; legR=-4; } // 踏ん張り
  ctx.fillStyle='#2a1a08';
  if(isWalk){
    // 歩行：交互に前後
    ctx.save();ctx.translate(-w*0.14,-bobY);ctx.rotate(legL*0.05);
    ctx.fillRect(-w*0.18,0,w*0.36,h*0.28);ctx.restore();
    ctx.save();ctx.translate(w*0.14,-bobY);ctx.rotate(legR*0.05);
    ctx.fillRect(-w*0.18,0,w*0.36,h*0.28);ctx.restore();
  } else {
    ctx.fillRect(-w/2*0.5,-bobY,w*0.38,h*0.28);
    ctx.fillRect(w*0.12,-bobY,w*0.38,h*0.28);
  }

  // Body
  ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=f.auraT>0?8:0;
  var bodyTilt=isBlock?0.08:isPunch?-0.1*atkProgress:0;
  ctx.save();ctx.rotate(bodyTilt);
  ctx.beginPath();ctx.roundRect(-w/2,-h*0.72-bobY,w,h*0.44,2);ctx.fill();
  drawOutfit(f,w,h,bobY,col);
  ctx.restore();
  ctx.shadowBlur=0;

  // Arms
  var armOff=isPunch?Math.sin(atkProgress*Math.PI)*14:0;
  var armLift=isBlock?-h*0.06:0;
  ctx.fillStyle=col;
  ctx.fillRect(-w/2-6,-h*0.7-bobY+armLift,8,h*0.3);
  ctx.fillRect(w/2-2+armOff,-h*0.7-bobY,8,h*0.3);
  if(isPunch){
    ctx.fillStyle=col2;
    ctx.beginPath();ctx.arc(w/2+armOff,-h*0.58-bobY,5,0,Math.PI*2);ctx.fill();
  }
  if(isBlock){
    // ガードポーズ：両腕を前に
    ctx.fillStyle=col;
    ctx.fillRect(-w/2-2,-h*0.72-bobY,10,h*0.28);
    ctx.fillRect(w/2-8,-h*0.72-bobY,10,h*0.28);
  }
  if(isSpecial){
    var sc=f.def.specialCol||'#f1c40f';
    var sp=f.def.special||'';
    var sf=f.stateT; // 残りフレーム（40→0）
    var sp_prog=Math.max(0,Math.min(1,1-(sf/40))); // 進行度0→1
    var gt=gameTime*0.18; // 高速タイマー
    var sp_pulse=Math.sin(gt*2.5);

    // ── 共通：オーラリング2重 ──
    ctx.save();
    ctx.globalAlpha=0.35+sp_pulse*0.2;
    ctx.strokeStyle=sc;ctx.lineWidth=3+sp_pulse*2;
    ctx.beginPath();ctx.arc(0,-h*0.45-bobY,w*1.1+sp_pulse*5,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=0.15+sp_pulse*0.1;
    ctx.strokeStyle=sc;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(0,-h*0.45-bobY,w*1.7-sp_pulse*3,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=0.10;
    ctx.fillStyle=sc;
    ctx.beginPath();ctx.arc(0,-h*0.45-bobY,w*1.5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    ctx.restore();

    if(sp==='百裂拳'||sp==='神速連打'){
      // 高速連打：両腕が残像を描いて前後に激しく動く
      for(var si=0;si<4;si++){
        var sOff=Math.sin((gt+si)*2.2)*20*(1-si*0.15);
        ctx.globalAlpha=1-si*0.22;
        ctx.fillStyle=sc;
        ctx.fillRect(w/2+sOff,-h*0.68-bobY,9,h*0.28);
        ctx.fillRect(-w/2-9-sOff*0.5,-h*0.68-bobY,9,h*0.28);
        ctx.beginPath();ctx.arc(w/2+sOff+4,-h*0.57-bobY,6-si,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
      // 衝撃波エフェクト
      if(sp_prog>0.3){
        ctx.strokeStyle=sc;ctx.lineWidth=2;
        ctx.globalAlpha=(1-sp_prog)*0.8;
        for(var sw=0;sw<3;sw++){
          ctx.beginPath();ctx.arc(w/2+16,-h*0.57-bobY,(sp_prog*30)+sw*8,0,Math.PI*2);ctx.stroke();
        }
        ctx.globalAlpha=1;
      }
    } else if(sp==='岩砕き'||sp==='鬼神拳'||sp==='鬼母拳'){
      // 大振り一撃：体を大きく反らせて振り下ろす
      var swing=Math.sin(sp_prog*Math.PI);
      ctx.save();ctx.rotate(-swing*0.4*f.facing);
      // 振り上げた腕（大）
      ctx.fillStyle=sc;
      ctx.fillRect(w/2-4,-h*0.85-bobY-swing*12,12,h*0.42+swing*12);
      ctx.restore();
      // 拳（大きく光る）
      ctx.fillStyle=sc;
      ctx.globalAlpha=0.7+sp_pulse*0.3;
      ctx.beginPath();ctx.arc(w/2+14*f.facing,-h*0.55-bobY+swing*8,9+swing*5,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
      // 衝撃亀裂線
      if(sp_prog>0.5){
        var crack=sp_prog-0.5;
        ctx.strokeStyle=sc;ctx.lineWidth=2;ctx.globalAlpha=crack*1.6;
        for(var cl=0;cl<5;cl++){
          var ca=(cl/5)*Math.PI-Math.PI*0.2;
          ctx.beginPath();ctx.moveTo(w/2+14*f.facing,-h*0.55-bobY);
          ctx.lineTo(w/2+14*f.facing+Math.cos(ca)*crack*40,-h*0.55-bobY+Math.sin(ca)*crack*30);ctx.stroke();
        }
        ctx.globalAlpha=1;
      }
    } else if(sp==='乱舞'||sp==='双竜脚'||sp==='流星蹴'){
      // 回転乱舞：体ごと高速回転しながら連続攻撃
      var spin=gt*3.0;
      ctx.save();ctx.rotate(Math.sin(spin)*0.6);
      ctx.fillStyle=sc;
      for(var ri=0;ri<6;ri++){
        var ra=spin+ri*(Math.PI*2/6);
        ctx.globalAlpha=0.65-ri*0.08;
        ctx.beginPath();ctx.arc(Math.cos(ra)*22,-h*0.5-bobY+Math.sin(ra)*11,6,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
      ctx.strokeStyle=sc;ctx.lineWidth=3;ctx.globalAlpha=0.7;
      ctx.beginPath();ctx.moveTo(0,-h*0.3-bobY);ctx.bezierCurveTo(w*0.8,-h*0.1-bobY,w*1.2,-h*0.5-bobY,w/2+18,-h*0.55-bobY);ctx.stroke();
      ctx.globalAlpha=1;
      ctx.restore();
    } else if(sp==='鬼蜘蛛斬'||sp==='制空拳'){
      // 広範囲斬り：横に大きく腕を振る
      var slash=Math.sin(sp_prog*Math.PI);
      ctx.save();ctx.rotate(slash*0.3*(f.facing||1));
      ctx.strokeStyle=sc;ctx.lineWidth=4;ctx.globalAlpha=0.8;
      // 斬撃弧
      ctx.beginPath();
      ctx.arc(0,-h*0.55-bobY,w*1.2,
        -Math.PI*0.8+slash*0.6,
        Math.PI*0.8-slash*0.6);
      ctx.stroke();
      ctx.lineWidth=2;ctx.globalAlpha=0.4;
      ctx.beginPath();ctx.arc(0,-h*0.55-bobY,w*1.5,-Math.PI*0.6,Math.PI*0.6);ctx.stroke();
      ctx.globalAlpha=1;
      // 伸びる腕
      ctx.fillStyle=sc;
      ctx.fillRect(w/2-2,-h*0.72-bobY,w*0.7*slash,h*0.28);
      ctx.restore();
    } else {
      // デフォルト必殺：全方位爆発エフェクト
      for(var di=0;di<8;di++){
        var da=di/8*Math.PI*2+gt*1.5;
        var dr=(0.3+sp_prog*0.7)*w*1.8;
        ctx.fillStyle=sc;
        ctx.globalAlpha=(1-sp_prog)*0.85;
        ctx.beginPath();ctx.arc(Math.cos(da)*dr,-h*0.5-bobY+Math.sin(da)*dr*0.5,5+sp_prog*4,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
      ctx.fillStyle=sc;
      var sa2=Math.sin(gt*3.0)*18;
      ctx.fillRect(w/2-2+sa2,-h*0.68-bobY,9,h*0.28);
      ctx.fillRect(-w/2-6-sa2*0.5,-h*0.68-bobY,9,h*0.28);
    }

    // ── 共通：必殺技名フラッシュ（頭上・グロー付き）──
    ctx.save();
    // 登場フェーズ: sp_prog<0.3でフェードイン、それ以降は常時表示
    var nameAlpha=sp_prog<0.3?(sp_prog/0.3):1.0;
    ctx.globalAlpha=nameAlpha*0.95;
    ctx.fillStyle=sc;
    ctx.font='bold '+(11+sp_pulse*2)+'px "Noto Sans JP",sans-serif';
    ctx.textAlign='center';
    ctx.shadowColor=sc;ctx.shadowBlur=16+sp_pulse*6;
    ctx.fillText(sp, 0, -h*1.12-bobY-sp_pulse*2);
    // 2重描きでグロー強化
    ctx.globalAlpha=nameAlpha*0.4;
    ctx.font='bold '+(15+sp_pulse*3)+'px "Noto Sans JP",sans-serif';
    ctx.fillText(sp, 0, -h*1.12-bobY-sp_pulse*2);
    ctx.shadowBlur=0;
    ctx.restore();
  }

  // Weapon（スイングあり）
  if(f.weapon) drawWeaponOnFighter(f,w,h,bobY);

  // Head
  var headTilt=isPunch?atkProgress*0.08:isBlock?0.05:0;
  ctx.save();ctx.rotate(headTilt);
  ctx.fillStyle=col2;
  ctx.beginPath();ctx.arc(0,-h*0.82-bobY,w*0.44,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=hurt?'#fff':'#1a1008';
  ctx.fillRect(4,-h*0.85-bobY,4,4);
  if(hurt){ctx.fillStyle='#e74c3c';ctx.fillRect(4,-h*0.85-bobY,4,4);}
  ctx.restore();
  drawHair(f,w,h,hair,bobY);
}

function drawOutfit(f,w,h,bobY,col){
  var outfit=f.def.outfit||'suit';
  if(outfit==='uniform'){
    ctx.fillStyle='#f5e8c8';
    ctx.beginPath();ctx.moveTo(-4,-h*0.72-bobY);ctx.lineTo(0,-h*0.55-bobY);ctx.lineTo(4,-h*0.72-bobY);ctx.fill();
    ctx.fillStyle='#d4a017';
    for(var bi=0;bi<3;bi++) ctx.fillRect(-1,-h*0.65+bi*7-bobY,2,2);
  } else if(outfit==='suit'){
    ctx.fillStyle='#f0f0f0';
    ctx.fillRect(-w*0.22,-h*0.72-bobY,w*0.44,h*0.44);
    ctx.fillStyle=col;
    ctx.beginPath();ctx.moveTo(-w/2,-h*0.72-bobY);ctx.lineTo(-w*0.06,-h*0.72-bobY);ctx.lineTo(-w*0.06,-h*0.34-bobY);ctx.lineTo(-w/2,-h*0.38-bobY);ctx.fill();
    ctx.beginPath();ctx.moveTo(w/2,-h*0.72-bobY);ctx.lineTo(w*0.06,-h*0.72-bobY);ctx.lineTo(w*0.06,-h*0.34-bobY);ctx.lineTo(w/2,-h*0.38-bobY);ctx.fill();
    ctx.fillStyle='#c0392b';
    ctx.beginPath();ctx.moveTo(-3,-h*0.70-bobY);ctx.lineTo(3,-h*0.70-bobY);ctx.lineTo(4,-h*0.50-bobY);ctx.lineTo(0,-h*0.44-bobY);ctx.lineTo(-4,-h*0.50-bobY);ctx.fill();
  } else if(outfit==='china'){
    ctx.fillStyle='#f5e8c8';
    ctx.fillRect(-w*0.12,-h*0.72-bobY,w*0.24,h*0.12);
    ctx.fillStyle=col;
    ctx.fillRect(-w*0.04,-h*0.72-bobY,w*0.08,h*0.12);
    ctx.fillStyle='#d4a017';
    for(var ci=0;ci<3;ci++){
      ctx.beginPath();ctx.arc(-w*0.22,-h*0.65+ci*8-bobY,2.5,0,Math.PI*2);ctx.fill();
      ctx.fillRect(-w*0.22,-h*0.65+ci*8-bobY,w*0.44,1.5);
    }
    ctx.strokeStyle='rgba(212,160,23,0.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(w*0.42,-h*0.45-bobY);ctx.lineTo(w*0.42,-h*0.28-bobY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-w*0.42,-h*0.45-bobY);ctx.lineTo(-w*0.42,-h*0.28-bobY);ctx.stroke();
  } else if(outfit==='happi'){
    ctx.fillStyle='rgba(255,255,255,0.18)';
    ctx.beginPath();ctx.moveTo(-w/2,-h*0.72-bobY);ctx.lineTo(-w*0.1,-h*0.72-bobY);ctx.lineTo(0,-h*0.52-bobY);ctx.lineTo(-w/2,-h*0.44-bobY);ctx.fill();
    ctx.beginPath();ctx.moveTo(w/2,-h*0.72-bobY);ctx.lineTo(w*0.1,-h*0.72-bobY);ctx.lineTo(0,-h*0.52-bobY);ctx.lineTo(w/2,-h*0.44-bobY);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.fillRect(-w/2,-h*0.43-bobY,w,h*0.08);
    ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(0,-h*0.58-bobY,5,0,Math.PI*2);ctx.stroke();
  } else if(outfit==='tank'){
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.fillRect(-w/2,-h*0.72-bobY,w*0.14,h*0.44);
    ctx.fillRect(w/2-w*0.14,-h*0.72-bobY,w*0.14,h*0.44);
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,-h*0.68-bobY);ctx.lineTo(0,-h*0.48-bobY);ctx.stroke();
    ctx.beginPath();ctx.arc(0,-h*0.60-bobY,w*0.28,0.2,Math.PI-0.2);ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-w*0.32,-h*0.72-bobY);ctx.lineTo(-w*0.32,-h*0.66-bobY);ctx.lineTo(w*0.32,-h*0.66-bobY);ctx.lineTo(w*0.32,-h*0.72-bobY);ctx.stroke();
  } else if(outfit==='track'){
    ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-w/2,-h*0.72-bobY);ctx.lineTo(-w/2,-h*0.28-bobY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(w/2,-h*0.72-bobY);ctx.lineTo(w/2,-h*0.28-bobY);ctx.stroke();
    ctx.strokeStyle='rgba(200,200,200,0.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,-h*0.72-bobY);ctx.lineTo(0,-h*0.44-bobY);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.fillRect(-w/2,-h*0.56-bobY,w,h*0.07);
  } else if(outfit==='coat'){
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.fillRect(-w/2,-h*0.72-bobY,w,h*0.44);
    ctx.fillStyle=col;
    ctx.beginPath();ctx.moveTo(-w/2,-h*0.72-bobY);ctx.lineTo(0,-h*0.56-bobY);ctx.lineTo(w/2,-h*0.72-bobY);ctx.lineTo(w/2,-h*0.28-bobY);ctx.lineTo(-w/2,-h*0.28-bobY);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.5)';
    for(var oi=0;oi<4;oi++) ctx.fillRect(-1,-h*0.68+oi*8-bobY,2,2);
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;
    ctx.strokeRect(-w/2,-h*0.72-bobY,w,h*0.44);
  }
}

function drawHair(f,w,h,hair,bobY){
  ctx.fillStyle=hair;
  if(f.def.isQueen||f.def.isFemBoss){
    ctx.beginPath();ctx.ellipse(0,-h*0.92-bobY,w*0.5,w*0.35,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(-w*0.5,-h*0.88-bobY);ctx.lineTo(-w*0.7,-h*1.0-bobY);
    ctx.lineTo(-w*0.3,-h*0.94-bobY);ctx.fill();
  } else if(f.def.isSurvivalBoss&&false){
    // unused
  } else if(f.def.isFinal||f.def.isSurvivalBoss){
    ctx.fillRect(-w*0.44,-h*0.97-bobY,w*0.88,w*0.28);
    ctx.fillStyle='#c0392b';ctx.fillRect(2,-h*0.82-bobY,1,9);
  } else if(f.def.isExCop){
    // 角刈り・元警官
    ctx.fillRect(-w*0.42,-h*0.97-bobY,w*0.84,w*0.22);
    ctx.fillStyle='#666';ctx.fillRect(-w*0.38,-h*0.83-bobY,w*0.76,6); // ヒゲ
  } else if(f.def.isOyabun){
    // 丸刈り・巨漢
    ctx.beginPath();ctx.arc(0,-h*0.86-bobY,w*0.48,Math.PI,Math.PI*2);ctx.fill();
    ctx.fillStyle='#555';ctx.fillRect(-w*0.3,-h*0.83-bobY,w*0.6,5); // 口ヒゲ
  } else if(f.def.isTwins){
    // ツーブロック
    ctx.fillRect(-w*0.44,-h*0.97-bobY,w*0.88,w*0.2);
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(-w*0.2,-h*0.97-bobY,w*0.4,w*0.2);
  } else if(f.def.isGanzo){
    ctx.beginPath();ctx.arc(0,-h*0.86-bobY,w*0.46,Math.PI,Math.PI*2);ctx.fill();
    ctx.fillStyle='#222';ctx.fillRect(-w*0.2,-h*0.83-bobY,w*0.4,4);
  } else if(f.def.isMitsuki){
    ctx.beginPath();ctx.ellipse(0,-h*0.92-bobY,w*0.5,w*0.35,0,0,Math.PI*2);ctx.fill();
    ctx.fillRect(-w*0.5,-h*0.9-bobY,w*0.22,h*0.35);
  } else if(f.def.isShinki){
    ctx.fillStyle='#ff0000';
    for(var sp2=0;sp2<7;sp2++){
      var sang2=-Math.PI*0.7+sp2*0.23;
      ctx.beginPath();
      ctx.moveTo(0,-h*0.9-bobY);
      ctx.lineTo(Math.cos(sang2)*w*0.8,-h*0.9-bobY-w*0.8);
      ctx.lineTo(Math.cos(sang2+0.12)*w*0.5,-h*0.9-bobY-w*0.5);
      ctx.fill();
    }
  } else {
    ctx.fillStyle=hair;
    ctx.beginPath();
    ctx.moveTo(-w*0.4,-h*0.82-bobY);
    ctx.quadraticCurveTo(0,-h*1.05-bobY,w*0.4,-h*0.82-bobY);
    ctx.fill();
  }
}

function drawWeaponOnFighter(f,w,h,bobY){
  var wd=WEAPONS[f.weapon];
  if(!wd) return;
  var t=f.stateT||0;
  var isAtk=f.state==='atk'||f.state==='katk';
  // スイング進行 0→1 アーク（攻撃モーション中）
  var swingRaw=isAtk?Math.max(0,(1-(t/22))):0;
  var swing=Math.sin(swingRaw*Math.PI); // 0→1→0

  // 常に手元に表示：idle/walkは構え、攻撃時はスイング
  // アーム伸び量
  var armFwd=isAtk?swing*14:0;

  // 基本角度：構え=少し前傾、攻撃=大きく振る
  var holdAng=0.28;
  var swingAng=isAtk ? holdAng - swing*2.4 : holdAng;

  ctx.save();
  ctx.translate(w/2+4+armFwd,(-h*0.60)-bobY);
  ctx.rotate(swingAng);
  ctx.lineCap='round';ctx.lineJoin='round';

  var c=wd.col;

  if(f.weapon==='bat'){
    // グリップ
    ctx.strokeStyle='#4a2a08';ctx.lineWidth=6;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-14);ctx.stroke();
    // バレル
    ctx.strokeStyle=c;ctx.lineWidth=8;
    ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(0,-30);ctx.stroke();
    // ノブ
    ctx.strokeStyle='#d4a017';ctx.lineWidth=10;
    ctx.beginPath();ctx.moveTo(0,-26);ctx.lineTo(0,-33);ctx.stroke();
    // スイング軌跡
    if(swing>0.3){
      ctx.strokeStyle='rgba(255,200,30,'+swing*0.5+')';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(0,-28,16,Math.PI*0.6,Math.PI*1.6);ctx.stroke();
    }

  } else if(f.weapon==='bokken'){
    // 右手（メイン・前に振る）- 親のsave/translate/rotateそのまま
    ctx.strokeStyle='#4a2a08';ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-11);ctx.stroke();
    ctx.fillStyle='#8B5E3C';ctx.fillRect(-4,-12,8,3);
    ctx.strokeStyle=c;ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(0,-11);ctx.lineTo(2,-32);ctx.stroke();
    if(swing>0.3){
      ctx.strokeStyle='rgba(180,120,40,'+swing*0.55+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(2,-28,13,Math.PI*0.6,Math.PI*1.7);ctx.stroke();
    }
    // 左手（逆手）- いったんrestoreして別位置にsave
    ctx.restore();
    ctx.save();
    var lx2=-(w/2+4+armFwd);
    var ly2=(-h*0.60)-bobY;
    var r2Ang=isAtk?(0.5+swing*1.4):-0.25;
    ctx.translate(lx2,ly2);
    ctx.rotate(r2Ang);
    ctx.lineCap='round';ctx.lineJoin='round';
    ctx.strokeStyle='#4a2a08';ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-10);ctx.stroke();
    ctx.fillStyle='#8B5E3C';ctx.fillRect(-4,-11,8,3);
    ctx.strokeStyle=c;ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(-2,-30);ctx.stroke();
    if(swing>0.4){
      ctx.strokeStyle='rgba(180,120,40,'+swing*0.4+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(-2,-26,10,Math.PI*1.2,Math.PI*2.2);ctx.stroke();
    }

  } else if(f.weapon==='chain'){
    var sp=swing*14;
    ctx.strokeStyle=c;ctx.lineWidth=3;
    for(var ci=0;ci<6;ci++){
      var lcx=ci*5-8+sp*0.25;
      var lcy=ci*4.5-10-sp*0.6;
      ctx.beginPath();ctx.arc(lcx,lcy,3,0,Math.PI*2);ctx.stroke();
    }
    if(swing>0.4){
      ctx.strokeStyle='rgba(220,220,220,'+swing*0.45+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,-4,20,Math.PI*0.9,Math.PI*2.1);ctx.stroke();
    }

  } else if(f.weapon==='nunchaku'){
    // 棒1
    ctx.strokeStyle=c;ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-16);ctx.stroke();
    // 紐
    ctx.strokeStyle='#5a3a1a';ctx.lineWidth=2;
    var ropeSwing=swing*12;
    ctx.beginPath();ctx.moveTo(0,-16);ctx.quadraticCurveTo(8+ropeSwing,-20,6+ropeSwing,-28);ctx.stroke();
    // 棒2（振れる）
    ctx.strokeStyle=c;ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(6+ropeSwing,-28);ctx.lineTo(6+ropeSwing,-42);ctx.stroke();
    if(swing>0.5){
      ctx.strokeStyle='rgba(160,100,30,'+swing*0.5+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(6+ropeSwing,-36,10,0,Math.PI*2);ctx.stroke();
    }

  } else if(f.weapon==='pipe'){
    ctx.strokeStyle=c;ctx.lineWidth=7;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(3,-30);ctx.stroke();
    // 端の金属感
    ctx.strokeStyle='#aab';ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(3,-27);ctx.lineTo(4,-33);ctx.stroke();
    if(swing>0.4){
      ctx.strokeStyle='rgba(120,140,200,'+swing*0.45+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(4,-30,12,Math.PI*0.7,Math.PI*1.8);ctx.stroke();
    }

  } else if(f.weapon==='cutter'){
    // 本体
    ctx.fillStyle='#666';
    ctx.fillRect(-4,0,8,-14);
    // 刃
    ctx.fillStyle='#ddd';
    ctx.beginPath();ctx.moveTo(4,-10);ctx.lineTo(8,-14);ctx.lineTo(4,-14);ctx.fill();
    if(swing>0.5){
      ctx.strokeStyle='rgba(220,220,220,'+swing*0.6+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(6,-13,8,Math.PI*0.8,Math.PI*1.6);ctx.stroke();
    }

  } else if(f.weapon==='shovel'){
    // 柄
    ctx.strokeStyle='#6B4C2A';ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(1,-26);ctx.stroke();
    // ヘッド
    ctx.fillStyle=c;
    ctx.beginPath();
    ctx.moveTo(-8,-26);ctx.lineTo(8,-26);ctx.lineTo(6,-34);ctx.lineTo(-6,-34);ctx.closePath();
    ctx.fill();
    if(swing>0.4){
      ctx.strokeStyle='rgba(150,150,180,'+swing*0.45+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,-32,12,Math.PI*0.6,Math.PI*1.6);ctx.stroke();
    }

  } else if(f.weapon==='bottle'){
    ctx.fillStyle=c;ctx.globalAlpha=0.9;
    ctx.fillRect(-3,0,6,-14);
    ctx.fillRect(-5,-14,10,-5);
    ctx.globalAlpha=1;
    if(!isAtk){
      ctx.fillStyle='rgba(200,255,200,0.3)';
      ctx.beginPath();ctx.arc(0,-16,3,0,Math.PI*2);ctx.fill();
    }
    if(swing>0.5){
      ctx.strokeStyle='rgba(100,200,100,'+swing*0.5+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,-17,9,0,Math.PI*2);ctx.stroke();
    }

  } else if(f.weapon==='katana'){
    // グリップ
    ctx.strokeStyle='#2a1a08';ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-12);ctx.stroke();
    ctx.strokeStyle='#d4a017';ctx.lineWidth=7;
    ctx.beginPath();ctx.moveTo(-4,-10);ctx.lineTo(4,-10);ctx.stroke(); // 鍔
    // 刀身
    ctx.strokeStyle=c;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(1,-40);ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-1,-12);ctx.lineTo(0,-40);ctx.stroke(); // 刃紋
    if(swing>0.3){
      ctx.strokeStyle='rgba(200,220,255,'+swing*0.7+')';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(0,-32,18,Math.PI*0.5,Math.PI*1.5);ctx.stroke();
    }

  } else if(f.weapon==='hammer'){
    // 柄
    ctx.strokeStyle='#5a3a1a';ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-22);ctx.stroke();
    // ヘッド
    ctx.fillStyle=c;ctx.fillRect(-10,-30,20,14);
    ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(-10,-30,20,14);
    if(swing>0.4){
      ctx.strokeStyle='rgba(180,180,180,'+swing*0.6+')';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(0,-26,16,Math.PI*0.6,Math.PI*1.5);ctx.stroke();
    }

  } else if(f.weapon==='umbrella'){
    // 柄
    ctx.strokeStyle='#4a2a1a';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-28);ctx.stroke();
    // 傘部分
    ctx.fillStyle=c;ctx.globalAlpha=0.85;
    ctx.beginPath();ctx.arc(0,-28,12,Math.PI,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    ctx.strokeStyle='#8b0000';ctx.lineWidth=1;
    for(var ui=0;ui<5;ui++){
      var ua=Math.PI+ui*(Math.PI/4);
      ctx.beginPath();ctx.moveTo(0,-28);ctx.lineTo(Math.cos(ua)*12,Math.sin(ua)*12-28);ctx.stroke();
    }
    // 先端
    ctx.strokeStyle='#aaa';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,-40);ctx.lineTo(0,-42);ctx.stroke();
    if(swing>0.3){
      ctx.strokeStyle='rgba(200,50,50,'+swing*0.5+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,-30,16,Math.PI*0.6,Math.PI*1.6);ctx.stroke();
    }

  } else if(f.weapon==='rod'){
    // 鉄筋（長めのまっすぐな棒）
    ctx.strokeStyle=c;ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(-2,0);ctx.lineTo(2,-36);ctx.stroke();
    ctx.strokeStyle='rgba(180,200,180,0.5)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-36);ctx.stroke();
    if(swing>0.3){
      ctx.strokeStyle='rgba(160,200,160,'+swing*0.5+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,-28,20,Math.PI*0.5,Math.PI*1.6);ctx.stroke();
    }

  } else if(f.weapon==='stun'){
    // スタンガン本体
    ctx.fillStyle='#333';ctx.fillRect(-4,0,8,-14);
    // 電極
    ctx.fillStyle='#888';ctx.fillRect(-5,-14,4,4);ctx.fillRect(1,-14,4,4);
    // 電撃エフェクト
    var stime=Date.now()*0.01;
    if(isAtk||Math.sin(stime)>0.3){
      ctx.strokeStyle='rgba(255,230,0,'+(0.6+Math.sin(stime)*0.4)+')';ctx.lineWidth=2;
      ctx.shadowColor='#ffe000';ctx.shadowBlur=8;
      ctx.beginPath();
      ctx.moveTo(-5,-14);ctx.lineTo(-2,-18);ctx.lineTo(2,-16);ctx.lineTo(5,-14);
      ctx.stroke();ctx.shadowBlur=0;
    }
    if(swing>0.4){
      ctx.strokeStyle='rgba(255,230,0,'+swing*0.7+')';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(0,-14,10,Math.PI*0.7,Math.PI*1.5);ctx.stroke();
    }

  } else if(f.weapon==='kusari'){
    // 分銅鎖：長い鎖＋重り
    var ks=swing*18;
    ctx.strokeStyle=c;ctx.lineWidth=3;
    for(var ki=0;ki<8;ki++){
      var klx=ki*4-8+ks*0.3+Math.sin(ki*0.8+ks*0.1)*3;
      var kly=ki*4-8-ks*0.8;
      ctx.beginPath();ctx.arc(klx,kly,2.5,0,Math.PI*2);ctx.stroke();
    }
    // 分銅
    ctx.fillStyle=c;
    ctx.beginPath();ctx.arc(8+ks*0.3,-8-ks*0.8+32,6,0,Math.PI*2);ctx.fill();
    if(swing>0.4){
      ctx.strokeStyle='rgba(212,160,23,'+swing*0.5+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(8,-4,24,Math.PI*0.7,Math.PI*2.1);ctx.stroke();
    }

  } else if(f.weapon==='knife'){
    // グリップ
    ctx.fillStyle='#2a1a08';ctx.fillRect(-3,0,6,-10);
    // 鍔
    ctx.fillStyle='#555';ctx.fillRect(-5,-10,10,3);
    // 刃
    ctx.fillStyle=c;
    ctx.beginPath();ctx.moveTo(-2,-13);ctx.lineTo(4,-13);ctx.lineTo(2,-28);ctx.lineTo(-2,-13);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.beginPath();ctx.moveTo(2,-13);ctx.lineTo(3,-13);ctx.lineTo(2,-28);ctx.fill();
    if(swing>0.5){
      ctx.strokeStyle='rgba(220,220,220,'+swing*0.7+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(2,-22,8,Math.PI*0.6,Math.PI*1.6);ctx.stroke();
    }

  } else if(f.weapon==='sign'){
    // 標識ポール
    ctx.strokeStyle='#aaa';ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-24);ctx.stroke();
    // 標識板（三角）
    ctx.fillStyle=c;
    ctx.beginPath();ctx.moveTo(0,-38);ctx.lineTo(-12,-24);ctx.lineTo(12,-24);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,-36);ctx.lineTo(-10,-25);ctx.lineTo(10,-25);ctx.closePath();ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 8px sans-serif';ctx.textAlign='center';
    ctx.fillText('!',0,-29);
    if(swing>0.4){
      ctx.strokeStyle='rgba(231,76,60,'+swing*0.5+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,-32,16,Math.PI*0.6,Math.PI*1.6);ctx.stroke();
    }
  }

  ctx.restore();
}

function hexRgb(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

// ═══════════════════════════════════════
//  STAGE BACKGROUNDS
// ═══════════════════════════════════════
function drawBG(stageIdx){
  var s=STAGES[stageIdx];
  var ox=scrollX;

  if(s.bgType==='school'){
    // 空
    var sk=ctx.createLinearGradient(0,0,0,H*0.58);
    sk.addColorStop(0,'#c8ddf0');sk.addColorStop(1,'#e8f4ff');
    ctx.fillStyle=sk;ctx.fillRect(0,0,W,H*0.58);

    // 校舎（遠景・パララックス 0.2倍）
    ctx.fillStyle='#c4b89a';
    for(var bi=0;bi<8;bi++){
      var bx=((bi*200)-(ox*0.2))%((8*200));
      if(bx<-200) bx+=8*200;
      ctx.fillRect(bx,H*0.06,170,H*0.54);
      ctx.fillStyle='#b0a488';ctx.fillRect(bx+8,H*0.10,154,H*0.50);
      // 窓
      ctx.fillStyle='#8bb4d8';
      for(var wr=0;wr<3;wr++) for(var wc2=0;wc2<5;wc2++){
        ctx.fillRect(bx+14+wc2*28,H*0.13+wr*58,20,30);
        ctx.strokeStyle='#6a8fa8';ctx.lineWidth=1;
        ctx.strokeRect(bx+14+wc2*28,H*0.13+wr*58,20,30);
      }
      ctx.fillStyle='#c4b89a';
    }

    // 床
    var gd=ctx.createLinearGradient(0,H*0.6,0,H);
    gd.addColorStop(0,'#c8b48a');gd.addColorStop(1,'#8a7455');
    ctx.fillStyle=gd;ctx.fillRect(0,H*0.6,W,H*0.4);
    // タイル目地
    ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=1;
    var toff=ox%60;
    for(var tx=-toff;tx<W+60;tx+=60){ctx.beginPath();ctx.moveTo(tx,H*0.6);ctx.lineTo(tx,H);ctx.stroke();}
    for(var ty2=H*0.6;ty2<H;ty2+=40){ctx.beginPath();ctx.moveTo(0,ty2);ctx.lineTo(W,ty2);ctx.stroke();}
    // ロッカー（パララックス 1.0倍 = 地上オブジェクト）
    for(var li=0;li<12;li++){
      var lx=li*200-(ox%2400);
      if(lx<-20) lx+=2400;
      if(lx>W+20) continue;
      ctx.fillStyle='#5a7a5a';ctx.fillRect(lx,H*0.6,18,H*0.25);
      ctx.strokeStyle='#3a5a3a';ctx.lineWidth=1;ctx.strokeRect(lx,H*0.6,18,H*0.25);
      ctx.fillStyle='#d4a017';ctx.beginPath();ctx.arc(lx+15,H*0.725,2,0,Math.PI*2);ctx.fill();
    }

  } else if(s.bgType==='warehouse'){
    // 夜空
    var nsk=ctx.createLinearGradient(0,0,0,H*0.58);
    nsk.addColorStop(0,'#0d1b2a');nsk.addColorStop(1,'#1a2a3a');
    ctx.fillStyle=nsk;ctx.fillRect(0,0,W,H*0.58);
    // 星（ほぼ固定）
    ctx.fillStyle='rgba(255,255,255,0.5)';
    for(var si=0;si<40;si++){
      var sx=((si*137)-(ox*0.02)+W)%W;
      var sy=8+((si*97)%55);
      ctx.beginPath();ctx.arc(sx,sy,0.7,0,Math.PI*2);ctx.fill();
    }
    // 倉庫シルエット（遠景 0.15倍）
    for(var wi2=0;wi2<6;wi2++){
      var wbx=wi2*260-(ox*0.15);
      wbx=((wbx%1560)+1560)%1560;
      var wbh=H*0.18+(wi2%3)*28;
      ctx.fillStyle='#0f1318';
      ctx.fillRect(wbx,H*0.42-wbh,220,wbh+H*0.2);
      // 波板ライン
      ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;
      for(var wl=0;wl<220;wl+=10){
        ctx.beginPath();ctx.moveTo(wbx+wl,H*0.42-wbh);ctx.lineTo(wbx+wl,H*0.62);ctx.stroke();
      }
    }
    // 赤警告灯（点滅）
    var rpt=Date.now()*0.002;
    for(var ri=0;ri<4;ri++){
      var rlx=ri*240+60-(ox*0.1);
      rlx=((rlx%960)+960)%960;
      ctx.fillStyle='rgba(192,57,43,'+(0.3+0.22*Math.sin(rpt+ri*1.5))+')';
      ctx.shadowColor='#c0392b';ctx.shadowBlur=14;
      ctx.beginPath();ctx.arc(rlx,H*0.36,7,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
    // 地面
    var cgg=ctx.createLinearGradient(0,H*0.6,0,H);
    cgg.addColorStop(0,'#1a1814');cgg.addColorStop(1,'#0d0c0a');
    ctx.fillStyle=cgg;ctx.fillRect(0,H*0.6,W,H*0.4);
    // 亀裂
    ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.lineWidth=1;
    var coff=ox%120;
    for(var crx=-coff;crx<W+120;crx+=120){
      ctx.beginPath();ctx.moveTo(crx,H*0.6);ctx.lineTo(crx+25,H);ctx.stroke();
    }
    // ドラム缶（地上 1.0倍）
    for(var dr=0;dr<10;dr++){
      var drx=dr*280+60-(ox%2800);
      if(drx<-40) drx+=2800;
      if(drx>W+40) continue;
      ctx.fillStyle='#2a3540';
      ctx.beginPath();ctx.roundRect(drx,H*0.72,34,30,4);ctx.fill();
      ctx.strokeStyle='#445566';ctx.lineWidth=1.5;ctx.stroke();
      // ストライプ
      ctx.strokeStyle='#c0392b';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(drx+6,H*0.72);ctx.lineTo(drx+6,H*0.72+30);ctx.stroke();
    }

  } else if(s.bgType==='ruins'||s.bgType==='survival'){ // ruins（廃校舎）
    // 不気味な夜
    var rsk=ctx.createLinearGradient(0,0,0,H*0.58);
    rsk.addColorStop(0,'#060306');rsk.addColorStop(1,'#100808');
    ctx.fillStyle=rsk;ctx.fillRect(0,0,W,H*0.58);
    // 月
    ctx.shadowColor='rgba(255,240,200,0.3)';ctx.shadowBlur=30;
    ctx.fillStyle='rgba(255,240,200,0.18)';
    ctx.beginPath();ctx.arc(W*0.78,H*0.13,32,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,240,200,0.07)';
    ctx.beginPath();ctx.arc(W*0.78,H*0.13,56,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // 廃墟シルエット（遠景 0.18倍）
    for(var rbi=0;rbi<7;rbi++){
      var rbx=rbi*220-(ox*0.18);
      rbx=((rbx%1540)+1540)%1540;
      var rbh=H*0.22+(rbi%4)*20;
      ctx.fillStyle='#0a0806';
      ctx.beginPath();
      ctx.moveTo(rbx,H*0.62);
      ctx.lineTo(rbx,H*0.62-rbh);
      ctx.lineTo(rbx+25,H*0.62-rbh-18);
      ctx.lineTo(rbx+55,H*0.62-rbh+8);
      ctx.lineTo(rbx+95,H*0.62-rbh-6);
      ctx.lineTo(rbx+135,H*0.62-rbh+12);
      ctx.lineTo(rbx+170,H*0.62-rbh-4);
      ctx.lineTo(rbx+200,H*0.62-rbh);
      ctx.lineTo(rbx+200,H*0.62);
      ctx.fill();
      // 割れた窓の金光
      ctx.fillStyle='rgba(212,160,23,0.12)';
      ctx.fillRect(rbx+18,H*0.62-rbh*0.65,18,26);
      ctx.fillRect(rbx+58,H*0.62-rbh*0.42,16,22);
    }
    // 炎・残り火（浮遊）
    var et=Date.now()*0.001;
    for(var em=0;em<12;em++){
      var emx=((em*130+Math.sin(et+em*2.1)*14)-(ox*0.3));
      emx=((emx%1560)+1560)%1560;
      var emy=H*0.38+Math.sin(et*1.2+em)*22;
      var eal=0.35+0.28*Math.sin(et+em);
      ctx.fillStyle='rgba(212,160,23,'+eal+')';
      ctx.beginPath();ctx.arc(emx,emy,1.8,0,Math.PI*2);ctx.fill();
    }
    // 地面
    var rg=ctx.createLinearGradient(0,H*0.6,0,H);
    rg.addColorStop(0,'#100808');rg.addColorStop(1,'#060404');
    ctx.fillStyle=rg;ctx.fillRect(0,H*0.6,W,H*0.4);
    // 瓦礫
    for(var rb=0;rb<14;rb++){
      var rbrx=rb*180+40-(ox%2520);
      if(rbrx<-20) rbrx+=2520;
      if(rbrx>W+20) continue;
      ctx.fillStyle='#1a1208';
      ctx.beginPath();
      ctx.moveTo(rbrx,H*0.62);ctx.lineTo(rbrx+20,H*0.62);
      ctx.lineTo(rbrx+14,H*0.62-12);ctx.lineTo(rbrx+5,H*0.62-9);
      ctx.fill();
    }
    // 床の金ライン
    ctx.strokeStyle='rgba(212,160,23,0.12)';ctx.lineWidth=2;
    var gloff=ox%100;
    for(var fl=-gloff;fl<W+100;fl+=100){
      ctx.beginPath();ctx.moveTo(fl,H*0.6);ctx.lineTo(fl,H);ctx.stroke();
    }

  } else if(s.bgType==='neon'){
    // ── 夜の歓楽街 ──
    var nk=ctx.createLinearGradient(0,0,0,H*0.6);
    nk.addColorStop(0,'#050010');nk.addColorStop(1,'#1a0528');
    ctx.fillStyle=nk;ctx.fillRect(0,0,W,H*0.6);
    // ネオンビル群（遠景）
    var neonCols=['#ff00aa','#00ffee','#ffaa00','#aa00ff','#00ff88'];
    for(var nb=0;nb<10;nb++){
      var nbx=((nb*220)-(ox*0.18))%(10*220);
      if(nbx<-220) nbx+=10*220;
      var nbh=H*(0.22+((nb*37)%10)*0.025);
      ctx.fillStyle='#1a0a28';ctx.fillRect(nbx,H*0.6-nbh,160,nbh);
      // ネオン看板
      var nc=neonCols[nb%neonCols.length];
      ctx.shadowColor=nc;ctx.shadowBlur=12;
      ctx.strokeStyle=nc;ctx.lineWidth=2;
      ctx.strokeRect(nbx+10,H*0.6-nbh+10,140,20);
      ctx.fillStyle=nc;ctx.font='bold 9px monospace';ctx.textAlign='center';
      ctx.fillText(['キャバレー幻','スナック夢','パチンコ鬼','居酒屋龍','ゲーセン鉄'][nb%5],nbx+80,H*0.6-nbh+24);
      ctx.shadowBlur=0;
      // 窓（光る）
      for(var nw=0;nw<4;nw++){
        ctx.fillStyle='rgba(255,220,100,0.4)';
        ctx.fillRect(nbx+12+nw*34,H*0.6-nbh+40,24,18);
      }
    }
    // 地面（アスファルト）
    var ng=ctx.createLinearGradient(0,H*0.6,0,H);
    ng.addColorStop(0,'#1a0a1a');ng.addColorStop(1,'#0d0508');
    ctx.fillStyle=ng;ctx.fillRect(0,H*0.6,W,H*0.4);
    // 水たまり反射
    var nt=Date.now()*0.001;
    for(var np=0;np<6;np++){
      var npx=((np*300+40)-(ox%1800));
      if(npx<-60) npx+=1800;
      if(npx>W+60) continue;
      ctx.globalAlpha=0.18+Math.sin(nt+np)*0.07;
      ctx.fillStyle=neonCols[np%neonCols.length];
      ctx.beginPath();ctx.ellipse(npx,H*0.64,38,6,0,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
    // 街灯
    for(var nl=0;nl<7;nl++){
      var nlx=((nl*240+20)-(ox%1680));
      if(nlx<-10) nlx+=1680;
      if(nlx>W+10) continue;
      ctx.strokeStyle='#aaa';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(nlx,H*0.62);ctx.lineTo(nlx,H*0.38);ctx.lineTo(nlx+18,H*0.36);ctx.stroke();
      ctx.fillStyle='rgba(255,240,180,0.7)';ctx.shadowColor='#ffee88';ctx.shadowBlur=16;
      ctx.beginPath();ctx.arc(nlx+18,H*0.36,5,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }

  } else if(s.bgType==='harbor'){
    // ── 暗黒の埠頭 ──
    var hk=ctx.createLinearGradient(0,0,0,H*0.6);
    hk.addColorStop(0,'#020810');hk.addColorStop(1,'#061420');
    ctx.fillStyle=hk;ctx.fillRect(0,0,W,H*0.6);
    // 星・月
    ctx.fillStyle='rgba(180,200,255,0.6)';
    for(var hs=0;hs<50;hs++){
      var hsx=((hs*173)-(ox*0.01)+W*2)%(W*2)%W;
      var hsy=4+((hs*97)%50);
      ctx.beginPath();ctx.arc(hsx,hsy,0.6,0,Math.PI*2);ctx.fill();
    }
    // 月
    ctx.fillStyle='rgba(220,230,255,0.85)';ctx.shadowColor='#aabbff';ctx.shadowBlur=18;
    ctx.beginPath();ctx.arc(W*0.8-(ox*0.005)%W,H*0.12,20,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // クレーン（遠景）
    ctx.strokeStyle='#1a2a3a';ctx.lineWidth=5;
    for(var hc=0;hc<4;hc++){
      var hcx=((hc*350+60)-(ox*0.12))%(4*350);
      if(hcx<-60) hcx+=4*350;
      ctx.beginPath();ctx.moveTo(hcx,H*0.6);ctx.lineTo(hcx,H*0.1);ctx.lineTo(hcx+80,H*0.1);ctx.stroke();
      ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(hcx+80,H*0.1);ctx.lineTo(hcx+80,H*0.3);ctx.stroke();
      ctx.lineWidth=5;
    }
    // 海（反射）
    var hwg=ctx.createLinearGradient(0,H*0.55,0,H*0.6);
    hwg.addColorStop(0,'#061420');hwg.addColorStop(1,'#0a1e30');
    ctx.fillStyle=hwg;ctx.fillRect(0,H*0.55,W,H*0.06);
    ctx.strokeStyle='rgba(0,140,200,0.15)';ctx.lineWidth=1;
    var hwt=Date.now()*0.0008;
    for(var hw=0;hw<8;hw++){
      var hwy=H*0.56+hw*5+Math.sin(hwt+hw)*2;
      ctx.beginPath();ctx.moveTo(0,hwy);ctx.lineTo(W,hwy);ctx.stroke();
    }
    // 地面（埠頭コンクリ）
    var hg=ctx.createLinearGradient(0,H*0.6,0,H);
    hg.addColorStop(0,'#0a1018');hg.addColorStop(1,'#050a0e');
    ctx.fillStyle=hg;ctx.fillRect(0,H*0.6,W,H*0.4);
    // コンテナ
    var contCols=['#8b2a2a','#2a4a8b','#2a8b4a','#8b6a2a'];
    for(var hco=0;hco<8;hco++){
      var hcox=((hco*260+30)-(ox%2080));
      if(hcox<-80) hcox+=2080;
      if(hcox>W+80) continue;
      var cc=contCols[hco%contCols.length];
      ctx.fillStyle=cc;ctx.fillRect(hcox,H*0.6-50,80,50);
      ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=2;
      for(var hcl=0;hcl<4;hcl++) ctx.strokeRect(hcox+hcl*20,H*0.6-50,20,50);
    }
    // 港の街灯（青白い）
    for(var hll=0;hll<6;hll++){
      var hllx=((hll*280+50)-(ox%1680));
      if(hllx<-10) hllx+=1680;
      if(hllx>W+10) continue;
      ctx.strokeStyle='#556';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(hllx,H*0.62);ctx.lineTo(hllx,H*0.35);ctx.stroke();
      ctx.fillStyle='rgba(180,200,255,0.8)';ctx.shadowColor='#8888ff';ctx.shadowBlur=14;
      ctx.beginPath();ctx.arc(hllx,H*0.35,4,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }

  } else if(s.bgType==='festival'){
    // ── 血染め縁日 ──
    var fk=ctx.createLinearGradient(0,0,0,H*0.6);
    fk.addColorStop(0,'#1a0500');fk.addColorStop(1,'#2a0a00');
    ctx.fillStyle=fk;ctx.fillRect(0,0,W,H*0.6);
    // 星
    ctx.fillStyle='rgba(255,180,100,0.4)';
    for(var fs2=0;fs2<35;fs2++){
      var fsx=((fs2*193)-(ox*0.01)+W*2)%(W*2)%W;
      var fsy=5+((fs2*83)%45);
      ctx.beginPath();ctx.arc(fsx,fsy,0.7,0,Math.PI*2);ctx.fill();
    }
    // 屋台・店（遠景）
    var ft=Date.now()*0.001;
    for(var fb=0;fb<8;fb++){
      var fbx=((fb*240+20)-(ox*0.2))%(8*240);
      if(fbx<-240) fbx+=8*240;
      ctx.fillStyle='#3a1a08';ctx.fillRect(fbx,H*0.38,180,H*0.24);
      // のれん
      ctx.fillStyle=['#c0392b','#d4a017','#2c3e50','#8b0000'][fb%4];
      for(var fn=0;fn<6;fn++){
        var fnx=fbx+fn*28+4;
        var fny=H*0.38+Math.sin(ft*1.5+fn+fb)*4;
        ctx.fillRect(fnx,fny,20,30);
      }
      // 提灯
      ctx.fillStyle='rgba(255,80,0,0.8)';ctx.shadowColor='#ff4400';ctx.shadowBlur=10;
      ctx.beginPath();ctx.ellipse(fbx+40,H*0.34+Math.sin(ft+fb)*3,10,14,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(fbx+100,H*0.33+Math.sin(ft*1.2+fb)*3,10,14,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(fbx+160,H*0.34+Math.sin(ft*0.8+fb)*3,10,14,0,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
    // 燃え上がる神輿（中景）
    var mky=H*0.42+Math.sin(ft*0.8)*6;
    var mkx=W*0.5-(ox*0.5%W);
    ctx.fillStyle='#8b2a00';ctx.fillRect(mkx-60,mky,120,60);
    ctx.fillStyle='#d4a017';ctx.fillRect(mkx-50,mky-20,100,24);
    for(var mf=0;mf<8;mf++){
      var mfx=mkx-50+mf*14+Math.sin(ft*3+mf)*3;
      var mfh=14+Math.sin(ft*2.5+mf*0.7)*8;
      ctx.fillStyle='rgba(255,'+(80+mf*20)+',0,0.7)';
      ctx.beginPath();ctx.moveTo(mfx,mky-20);ctx.lineTo(mfx+7,mky-20-mfh);ctx.lineTo(mfx+14,mky-20);ctx.fill();
    }
    // 地面（土道）
    var fg=ctx.createLinearGradient(0,H*0.6,0,H);
    fg.addColorStop(0,'#2a1008');fg.addColorStop(1,'#150804');
    ctx.fillStyle=fg;ctx.fillRect(0,H*0.6,W,H*0.4);
    // 縁日の紙くず
    for(var fp=0;fp<12;fp++){
      var fpx=((fp*170+30)-(ox%2040));
      if(fpx<-10) fpx+=2040;
      if(fpx>W+10) continue;
      ctx.fillStyle=['#c0392b','#d4a017','#fff'][fp%3];
      ctx.globalAlpha=0.35;
      ctx.fillRect(fpx,H*0.62,8,4);
      ctx.globalAlpha=1;
    }
    // 提灯の連なり（前景）
    ctx.strokeStyle='rgba(100,60,20,0.6)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,H*0.28);ctx.lineTo(W,H*0.28+Math.sin(ft)*6);ctx.stroke();
    for(var fll=0;fll<14;fll++){
      var fllx=((fll*80)-(ox*0.6))%1120;
      if(fllx<-20) fllx+=1120;
      ctx.fillStyle='rgba(255,60,0,0.75)';ctx.shadowColor='#ff3300';ctx.shadowBlur=8;
      ctx.beginPath();ctx.ellipse(fllx,H*0.28+Math.sin(ft+fll)*4,7,10,0,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
  } else if(s.bgType==='parking'){

        ctx.fillStyle='rgba(170,136,255,'+sca+')';
        ctx.beginPath();ctx.ellipse(scx,H*(0.15+sc%3*0.06),50,18,0,0,Math.PI*2);ctx.fill();
      }
      // 柱
      for(var spl=0;spl<8;spl++){
        var splx=((spl*120)-(ox*0.4))%(8*120);if(splx<-30) splx+=8*120;
        var splg=ctx.createLinearGradient(splx,0,splx+20,0);
        splg.addColorStop(0,'#2a1a50');splg.addColorStop(0.5,'#3a2860');splg.addColorStop(1,'#1a1040');
        ctx.fillStyle=splg;ctx.fillRect(splx,H*0.2,22,H*0.4);
        ctx.fillStyle='rgba(170,136,255,0.15)';ctx.fillRect(splx,H*0.18,26,8);ctx.fillRect(splx,H*0.56,26,6);
      }
      // オーラ
      var stog=ctx.createRadialGradient(W/2-(ox*0.2)%W,H*0.3,0,W/2-(ox*0.2)%W,H*0.3,H*0.35);
      stog.addColorStop(0,'rgba(170,136,255,0.07)');stog.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=stog;ctx.fillRect(0,0,W,H*0.6);
    }

    // 共通：地面
    var fbg=ctx.createLinearGradient(0,H*0.6,0,H);
    fbg.addColorStop(0,p.ground||'#101010');fbg.addColorStop(1,p.wall||'#080808');
    ctx.fillStyle=fbg;ctx.fillRect(0,H*0.6,W,H*0.4);
    // グリッド線
    ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
    var goff=ox%60;
    for(var gx=-goff;gx<W+60;gx+=60){ctx.beginPath();ctx.moveTo(gx,H*0.6);ctx.lineTo(gx,H);ctx.stroke();}
    for(var gy=H*0.6;gy<H;gy+=40){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}
    // アクセントライン
    ctx.strokeStyle=p.accent||'#d4a017';ctx.lineWidth=2;ctx.globalAlpha=0.5;
    ctx.beginPath();ctx.moveTo(0,H*0.6);ctx.lineTo(W,H*0.6);ctx.stroke();
    ctx.globalAlpha=1;
  }
}

var healItems=[];
var HEAL_TYPES={
  onigiri:{label:'おにぎり',col:'#fff',heal:30,icon:'🍙'},
  bento:  {label:'弁当',    col:'#d4a017',heal:60,icon:'🍱'},
  drink:  {label:'ドリンク',col:'#4af',  heal:20,icon:'🥤'},
};

function tryDropHeal(x,y){
  if(Math.random()<0.15){
    var types=Object.keys(HEAL_TYPES);
    var groundY=(player&&player.gy)||y||400;
    healItems.push({x:x,y:groundY,type:types[rnd(types.length)],pulse:0});
  }
}
function tryDropHealBoss(x,y){
  var groundY=(player&&player.gy)||y||400;
  healItems.push({x:x,y:groundY,type:'bento',pulse:0});
}

function pickupHeal(f){
  for(var i=healItems.length-1;i>=0;i--){
    var it=healItems[i];
    // X距離だけで判定（Y座標はground固定なので不要）
    if(Math.abs(it.x-f.x)<60){
      var ht=HEAL_TYPES[it.type];
      f.hp=Math.min(f.maxHp,f.hp+ht.heal);
      healItems.splice(i,1);
      burst(f.x,f.y-30,'#2ecc71',14,false);
      ann(ht.label+' +'+(ht.heal)+'HP','#2ecc71');
      updateHUD();
      return true;
    }
  }
  return false;
}

function drawHealItems(){
  var t=Date.now()*0.003;
  healItems.forEach(function(it){
    var wx=it.x-scrollX;
    if(wx<-20||wx>W+20) return;
    it.pulse+=0.08;
    var ht=HEAL_TYPES[it.type];
    var bob=Math.sin(it.pulse)*4;
    // 光輪
    ctx.save();ctx.translate(wx,it.y-8+bob);
    ctx.shadowColor=ht.col;ctx.shadowBlur=12+Math.sin(it.pulse)*4;
    ctx.strokeStyle=ht.col;ctx.globalAlpha=0.5+Math.sin(it.pulse)*0.2;
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;ctx.shadowBlur=0;
    // 絵文字
    ctx.font='18px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ht.icon,0,0);
    ctx.restore();
  });
}

function drawWDrop(wd){
  var wx=wd.x-scrollX;
  if(wx<-20||wx>W+20) return;
  var wc=WEAPONS[wd.type];
  if(!wc) return;
  ctx.save();ctx.translate(wx,wd.y-4);ctx.rotate(0.5);
  ctx.strokeStyle=wc.col;ctx.fillStyle=wc.col;ctx.lineWidth=3;ctx.lineCap='round';
  // glow
  ctx.shadowColor=wc.col;ctx.shadowBlur=10;
  if(wd.type==='bat'||wd.type==='bokken'){
    ctx.lineWidth=wd.type==='bat'?6:5;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-22);ctx.stroke();
    if(wd.type==='bat'){ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(0,-16);ctx.lineTo(0,-24);ctx.stroke();}
  } else if(wd.type==='chain'){
    ctx.lineWidth=3;
    for(var i=0;i<4;i++){ctx.beginPath();ctx.arc(i*5,i*4,3,0,Math.PI*2);ctx.stroke();}
  } else if(wd.type==='nunchaku'){
    ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-12);ctx.stroke();
    ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(6,-18);ctx.stroke();
    ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(6,-18);ctx.lineTo(6,-28);ctx.stroke();
  } else if(wd.type==='pipe'){
    ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(3,-22);ctx.stroke();
  } else if(wd.type==='cutter'){
    ctx.fillRect(-3,0,6,-12);
    ctx.fillStyle='#ddd';ctx.beginPath();ctx.moveTo(3,-8);ctx.lineTo(7,-12);ctx.lineTo(3,-12);ctx.fill();
  } else if(wd.type==='shovel'){
    ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(1,-18);ctx.stroke();
    ctx.fillRect(-7,-18,14,-8);
  } else {
    ctx.fillRect(-3,0,6,-14);ctx.fillRect(-5,-14,10,-5);
  }
  ctx.restore();
}

function startWave(idx){
  waveIdx=idx;
  var s=STAGES[currentStage];
  if(s.isSurvival){
    // 雑魚波スタート
    survivalInBossPhase=false;
    waveActive=true;
    spawnQ=(SURVIVAL_PHASE_ENEMIES[survivalPhase]||['thug']).slice();
    spawnT=60;
    ann('PHASE '+(survivalPhase+1)+' / '+s.survivalPhases,'#ff2200','');
    return;
  }
  var waveDef=WAVE_DEFS[currentStage];
  if(!waveDef||idx>=waveDef.length){stageComplete();return;}
  waveActive=true;
  if(!waveDef[idx]||!waveDef[idx].length){stageComplete();return;}
  spawnQ=waveDef[idx].slice();
  spawnT=60;
  var isBoss=spawnQ.length===1&&CHAR_DEFS[spawnQ[0]]&&CHAR_DEFS[spawnQ[0]].isBoss;
  ann(isBoss?'BOSS!!':'WAVE '+(idx+1),isBoss?'#c0392b':'#f1c40f');
}

function startSurvivalBoss(){
  survivalInBossPhase=true;
  waveActive=true;
  var base=CHAR_DEFS.boss_survival;
  var b={};for(var k in base)b[k]=base[k];
  b.hp=base.hp+survivalPhase*40;
  b.atk=base.atk+survivalPhase*4;
  b.katk=base.katk+survivalPhase*6;
  b.name='影鬼 剣造'+(survivalPhase>0?'【激怒Lv'+(survivalPhase+1)+'】':'');
  CHAR_DEFS._svboss=b;
  spawnQ=['_svboss'];
  spawnT=40;
  ann('BOSS!! フェイズ'+(survivalPhase+1),'#ff2200','');
}

function checkWaveClear(){
  if(!waveActive)return;
  var alive=enemies.filter(function(e){return !e.dead;});
  if(alive.length!==0||spawnQ.length!==0)return;
  waveActive=false;
  var s=STAGES[currentStage];
  if(s.isSurvival){
    if(!survivalInBossPhase){
      // 雑魚波クリア→ボス出現
      ann('ボスが来る！','#ff2200','');
      setTimeout(function(){startSurvivalBoss();},1500);
    } else {
      // ボス撃破→次フェイズ or クリア
      survivalPhase++;
      if(survivalPhase>=s.survivalPhases){
        ann('全フェイズ制覇！！','#f1c40f','お前が最強だ！！');
        setTimeout(function(){stageComplete();},2000);
      } else {
        ann('フェイズ'+survivalPhase+' クリア！','#4fa','まだ終わらん…！');
        setTimeout(function(){startWave(0);},2000);
      }
    }
    return;
  }
  var waveDef=WAVE_DEFS[currentStage];
  if(!waveDef){stageComplete();return;}
  if(waveIdx+1<waveDef.length){
    ann('WAVE CLEAR！','#4fa','次の波が来る…');
    setTimeout(function(){startWave(waveIdx+1);},1800);
  } else {
    var isFinalStage=currentStage===STAGES.length-1;
    if(isFinalStage){
      ann('神鬼を討つ！！','#ff0000','天下無双の証明！！');
      setTimeout(function(){stageComplete(true);},2500);
    } else {
      ann('STAGE CLEAR！！','#f1c40f','やったぜ！！');
      setTimeout(function(){stageComplete(false);},2000);
    }
  }
}

  var baseDef=CHAR_DEFS[typeKey];
  if(!baseDef) return;

  var def=baseDef;
  if(!baseDef.isBoss){
    var pool=getOutfitPool(currentStage);
