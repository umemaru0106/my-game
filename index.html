    if(outfits&&outfits.length){
      def={}; for(var k in baseDef) def[k]=baseDef[k];
      def.outfit=outfits[rnd(outfits.length)];
      // 衣装に合わせて色味も少しランダムに変化させる
      var colVars={uniform:['#8b3a1a','#6b2a0a','#5a3020','#9b4a2a'],suit:['#2a2a3a','#3a3a4a','#1a2a3a','#4a3a2a'],tank:['#3a3a5a','#4a3a4a','#2a4a3a','#5a3a3a'],track:['#1a3a6a','#2a4a2a','#3a1a5a','#4a3a1a'],happi:['#6b2a2a','#8b4a1a','#5a1a2a','#7a3a1a'],china:['#5a1a2a','#2a1a5a','#1a3a2a','#4a2a1a'],coat:['#1a1a2a','#2a1a1a','#1a2a1a','#2a2a1a']};
      var cv=colVars[def.outfit];
      if(cv) def.col=cv[rnd(cv.length)];
    }
  }
  var side=Math.random()<0.5?1:-1;
  var spawnX=scrollX+(side===1?W+40:-40);
  var groundY=H*0.7+rnd(H*0.15);
  var e=new Fighter(def,spawnX,groundY);
  e.facing=-side;
  if(def.isBoss){
    bossFight=true;
    document.getElementById('boss-panel').style.display='flex';
    document.getElementById('boss-name').textContent=def.name;
    document.getElementById('boss-sub').textContent=STAGES[currentStage].bossTitle;
    var rp=def.isShinki?'rgba(255,0,0,1)':def.isOyabun?'rgba(255,68,0,1)':def.isFinal?'rgba(212,160,23,1)':'rgba(192,57,43,1)';
    document.getElementById('boss-hp').style.background='linear-gradient(90deg,#3a0000,'+rp+')';
    ann(def.name,'#c0392b',STAGES[currentStage].bossTitle);
  }
  enemies.push(e);
  fighters.push(e);
  // 元警官は初期武器（警棒=pipe）
  if(def.isExCop){e.weapon='pipe';e.wUses=99;}
  // 通常敵の武器ドロップ確率
  if(Math.random()<0.3&&!def.isBoss){
    var wkeys=Object.keys(WEAPONS);
    var wk=wkeys[rnd(wkeys.length)];
    if(WEAPONS[wk]){e.weapon=wk;e.wUses=WEAPONS[wk].uses;}
  }
}


function onBossKO(boss){
  // 双子の場合：もう一人が生きていればパネルを維持
  if(boss.def.isTwins){
    var twinAlive=enemies.some(function(e){return !e.dead&&e.def.isTwins&&e!==boss;});
    if(twinAlive){
      burst(boss.x,boss.y-30,'#f1c40f',20,true); shake(12);
      ann(boss.def.name+'KO！','#fa0','まだもう一人いるぞ！');
      return; // パネルそのまま
    }
  }
  document.getElementById('boss-panel').style.display='none';
  burst(boss.x,boss.y-30,'#f1c40f',30,true); shake(20);
  ann('BOSS撃破！！','#f1c40f',boss.def.name+'を倒した！！');
  bossFight=false;
}

// ═══════════════════════════════════════
//  GAME FLOW
// ═══════════════════════════════════════
function startStage(idx){
  currentStage=idx;
  score=0; gameTime=0;
  var s=STAGES[idx];
  // 完全リセット
  fighters=[]; enemies=[]; allies=[]; wDrops=[]; healItems=[]; PARTS=[];
  spawnQ=[]; waveIdx=0; waveActive=false; survivalPhase=0;
  survivalInBossPhase=false; bossFight=false; scrollX=0;
  document.getElementById('boss-panel').style.display='none';

  // Player
  var pDef=CHAR_DEFS.player;
  player=new Fighter(pDef,80,H*0.75);
  player.facing=1;
  fighters.push(player);

  // Allies（セットアップで選んだ味方）
  allies=[];
  var allySlots=[CHAR_DEFS.ally1,CHAR_DEFS.ally2].filter(Boolean);
  var ax=[50,120];
  allySlots.forEach(function(aDef,i){
    var a=new Fighter(aDef,ax[i]||60,H*0.75);
    a.facing=1;
    // 味方の初期武器
    if(aDef.allyWeapon&&WEAPONS[aDef.allyWeapon]){
      a.weapon=aDef.allyWeapon;
      a.wUses=WEAPONS[aDef.allyWeapon].uses;
    }
    allies.push(a);
    fighters.push(a);
  });

  // 武器（セットアップで選んだ武器を最初から持つ）
  if(setupSelectedWeapon&&WEAPONS[setupSelectedWeapon]){
    player.weapon=setupSelectedWeapon;
    player.wUses=WEAPONS[setupSelectedWeapon].uses;
  }

  // UI
  document.getElementById('stage-label').textContent='STAGE '+(idx+1)+' — '+s.name;
  if(s.isSurvival) document.getElementById('stage-label').style.color='#ff2200';
  else document.getElementById('stage-label').style.color='';
  buildAllyUI();
  updateSpUI();
  
  showScreen(null);
  gameMode='playing';
  setMobileVisible(true); // ゲーム中のみ表示
  setTimeout(function(){startWave(0);},1200);
  ann('STAGE '+(idx+1),'var(--gold)',s.name);
}

function buildAllyUI(){
  var ap=document.getElementById('ally-panel');
  ap.innerHTML='';
  allies.forEach(function(a){
    var d=document.createElement('div');
    d.className='ally-dot alive';d.title=a.def.name;
    a._uiDot=d;ap.appendChild(d);
  });
}
function updateAllyUI(){
  allies.forEach(function(a){
    if(!a._uiDot) return;
    if(a.dead) a._uiDot.className='ally-dot';
    else if(a.state==='hurt') a._uiDot.className='ally-dot hurt';
    else a._uiDot.className='ally-dot alive';
  });
}
function updateSpUI(){
  if(!player) return;
  var el=document.getElementById('sp-icons');
  el.innerHTML='';
  for(var i=0;i<player.def.maxSp;i++){
    var d=document.createElement('span');d.className='sp-icon'+(i<player.spCharges?' ready':'');
    d.textContent='⚡';el.appendChild(d);
  }
}
function updateHUD(){
  if(!player) return;
  document.getElementById('p-hp').style.width=(player.hp/player.maxHp*100)+'%';
  document.getElementById('p-sp').style.width=player.sp+'%';
  document.getElementById('score-val').textContent=String(score).padStart(6,'0');
  var s=STAGES[currentStage];
  if(s&&s.isSurvival){
    document.getElementById('stage-label').textContent=
      'PHASE '+(survivalPhase+1)+' / '+s.survivalPhases+(bossFight?' 🔥BOSS':'');
  }
  updateAllyUI();
  if(bossFight){
    var boss=enemies.find(function(e){return e.isBoss&&!e.dead;});
    if(boss) document.getElementById('boss-hp').style.width=(boss.hp/boss.maxHp*100)+'%';
  }
}

function stageComplete(isFinalStage){
  gameMode='result';
  var sec=Math.floor(gameTime/60);
  var m=Math.floor(sec/60),ss=sec%60;
  if(isFinalStage){
    document.getElementById('res-rank').textContent='天下制覇！！';
    document.getElementById('res-rank').style.color='#ff0000';
  } else {
    document.getElementById('res-rank').textContent='勝利！';
    document.getElementById('res-rank').style.color='#f1c40f';
  }
  document.getElementById('res-score').textContent='SCORE: '+String(score).padStart(6,'0');
  document.getElementById('res-time').textContent='TIME: '+m+':'+(ss<10?'0':'')+ss;
  showScreen('resultScreen');
}
function gameOver(){
  gameMode='result';
  document.getElementById('res-rank').textContent='敗北…';
  document.getElementById('res-rank').style.color='#c0392b';
  document.getElementById('res-score').textContent='SCORE: '+String(score).padStart(6,'0');
  document.getElementById('res-time').textContent='--:--';
  showScreen('resultScreen');
}
function goTitle(){
  gameMode='title';
  showScreen('titleScreen');
  
  document.getElementById('setupScreen').classList.remove('active');
}
function retryCurrent(){
  openSetup(currentStage);
}
var _mobileEl=null;
function setMobileVisible(v){
  if(!_mobileEl) _mobileEl=document.getElementById('mobileCtrl');
  _mobileEl.classList[v?'add':'remove']('show');
}

function showScreen(id){
  ['titleScreen','resultScreen'].forEach(function(s){
    document.getElementById(s).classList[s===id?'remove':'add']('hidden');
  });
  document.getElementById('setupScreen').classList.remove('active');
  setMobileVisible(false); // タイトル・リザルト時は非表示
}

// ═══════════════════════════════════════
//  SETUP SCREEN LOGIC
// ═══════════════════════════════════════
var setupStageIdx=0;
var selectedCharKey='takeshi';
var selectedAllyKeys=[];
var selectedWpnKey=null; // nullは武器なし

function openSetup(stageIdx){
  setupStageIdx=stageIdx;
  selectedCharKey=PLAYABLE_CHARS[0].key;
  selectedAllyKeys=[];
  selectedWpnKey=null;
  setMobileVisible(false); // セットアップ中は非表示

  // タイトル
  document.getElementById('setup-stage-name').textContent=
    'STAGE '+(stageIdx+1)+' ― '+STAGES[stageIdx].name;

  // キャラグリッド
  var cg=document.getElementById('charGrid');
  cg.innerHTML='';
  PLAYABLE_CHARS.forEach(function(c){
    var card=document.createElement('div');
    card.className='char-card'+(c.key===selectedCharKey?' selected':'');
    var cv=document.createElement('canvas');
    cv.width=44; cv.height=52;
    drawMiniChar(cv.getContext('2d'),c,22,44);
    var sel=document.createElement('span');sel.className='sel-mark';sel.textContent='★';
    var nm=document.createElement('div');nm.className='cname';nm.textContent=c.name;
    var tp=document.createElement('div');tp.className='ctype';tp.textContent=c.type;
    var st=document.createElement('div');st.className='cstats';
    st.textContent='HP:'+c.hp+' ATK:'+c.atk;
    card.appendChild(cv);card.appendChild(sel);card.appendChild(nm);card.appendChild(tp);card.appendChild(st);
    card.addEventListener('click',function(){
      selectedCharKey=c.key;
      cg.querySelectorAll('.char-card').forEach(function(x){x.classList.remove('selected');});
      card.classList.add('selected');
    });
    cg.appendChild(card);
  });

  // 味方グリッド
  buildAllyGrid();

  // 武器グリッド
  var wg=document.getElementById('wpnGrid');
  wg.innerHTML='';
  // 「なし」カード
  var noCard=document.createElement('div');
  noCard.className='wpn-card'+(selectedWpnKey===null?' selected':'');
  noCard.innerHTML='<div class="wpn-icon">✊</div><div class="wname">なし</div><div class="wstats">素手</div><span class="sel-mark">✓</span>';
  noCard.addEventListener('click',function(){
    selectedWpnKey=null;
    wg.querySelectorAll('.wpn-card').forEach(function(x){x.classList.remove('selected');});
    noCard.classList.add('selected');
  });
  wg.appendChild(noCard);
  Object.keys(WEAPONS).forEach(function(k){
    var w=WEAPONS[k];
    var card=document.createElement('div');
    card.className='wpn-card'+(selectedWpnKey===k?' selected':'');
    var ic=document.createElement('div');ic.className='wpn-icon';ic.textContent=WPN_ICONS[k]||'⚔️';
    var nm=document.createElement('div');nm.className='wname';nm.textContent=w.label;
    var st=document.createElement('div');st.className='wstats';st.textContent='使用:'+w.uses+'回';
    var dm=document.createElement('div');dm.className='wdmg';dm.textContent='威力×'+w.dmg.toFixed(1);
    var sel=document.createElement('span');sel.className='sel-mark';sel.textContent='✓';
    card.appendChild(ic);card.appendChild(nm);card.appendChild(st);card.appendChild(dm);card.appendChild(sel);
    card.addEventListener('click',function(){
      selectedWpnKey=k;
      wg.querySelectorAll('.wpn-card').forEach(function(x){x.classList.remove('selected');});
      card.classList.add('selected');
    });
    wg.appendChild(card);
  });

  // 戻るボタン
  document.getElementById('setupBackBtn').onclick=function(){
    document.getElementById('setupScreen').classList.remove('active');
    showScreen('titleScreen');
    gameMode='title';
  };

  // 出撃ボタン
  document.getElementById('setupStartBtn').onclick=function(){
    launchStage();
  };

  // 画面切り替え
  ['titleScreen','resultScreen'].forEach(function(s){
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById('setupScreen').classList.add('active');
}

function buildAllyGrid(){
  var ag=document.getElementById('allyGrid');
  ag.innerHTML='';
  ALLY_CHARS.forEach(function(c){
    var card=document.createElement('div');
    var isSel=selectedAllyKeys.indexOf(c.key)!==-1;
    var isNone=c.isEmpty;
    card.className='ally-card'+(isSel?' selected':'')+(isNone?' ally-none':'');
    if(!isNone){
      var cv=document.createElement('canvas');
      cv.width=44;cv.height=52;
      drawMiniChar(cv.getContext('2d'),c,22,44);
      card.appendChild(cv);
    } else {
      var blank=document.createElement('div');
      blank.style.cssText='width:44px;height:52px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#333;margin:0 auto';
      blank.textContent='✕';
      card.appendChild(blank);
    }
    var sn=document.createElement('span');sn.className='sel-num';
    sn.textContent=(selectedAllyKeys.indexOf(c.key)+1)||'';
    var nm=document.createElement('div');nm.className='cname';nm.textContent=c.name;
    var tp=document.createElement('div');tp.className='ctype';tp.textContent=c.type;
    card.appendChild(sn);card.appendChild(nm);card.appendChild(tp);
    card.addEventListener('click',function(){
      if(isNone){ selectedAllyKeys=[]; buildAllyGrid(); return; }
      var idx=selectedAllyKeys.indexOf(c.key);
      if(idx!==-1){ selectedAllyKeys.splice(idx,1); }
      else if(selectedAllyKeys.length<2){ selectedAllyKeys.push(c.key); }
      buildAllyGrid();
    });
    ag.appendChild(card);
  });
  document.getElementById('allyLimitTxt').textContent=
    '選択中: '+selectedAllyKeys.length+' / 2';
}

function drawMiniChar(ctx,def,cx,cy){
  // シンプルなキャラプレビュー
  var w=def.w||20, h=def.h||50;
  var sc=Math.min(40/w, 48/h);
  var sw=w*sc, sh=h*sc;
  var bx=cx-sw/2, by=cy-sh*0.1;
  ctx.save();
  // 体
  ctx.fillStyle=def.col;
  ctx.fillRect(bx,by-sh*0.5,sw,sh*0.52);
  // 頭
  ctx.fillStyle=def.col2;
  ctx.beginPath();
  ctx.arc(cx,by-sh*0.58,sw*0.42,0,Math.PI*2);
  ctx.fill();
  // 髪
  ctx.fillStyle=def.hairCol||'#1a1008';
  if(def.isQueen){
    ctx.beginPath();ctx.ellipse(cx,by-sh*0.66,sw*0.46,sw*0.28,0,0,Math.PI*2);ctx.fill();
  } else {
    ctx.beginPath();
    ctx.moveTo(bx+sw*0.1,by-sh*0.56);
    ctx.quadraticCurveTo(cx,by-sh*0.8,bx+sw*0.9,by-sh*0.56);
    ctx.fill();
  }
  // 足
  ctx.fillStyle=def.col;
  ctx.fillRect(bx+sw*0.1,by,sw*0.35,sh*0.35);
  ctx.fillRect(bx+sw*0.55,by,sw*0.35,sh*0.35);
  ctx.restore();
}

function launchStage(){
  // 選んだキャラでCHAR_DEFS.playerを上書き
  var pc=PLAYABLE_CHARS.filter(function(c){return c.key===selectedCharKey;})[0]||PLAYABLE_CHARS[0];
  CHAR_DEFS.player=Object.assign({},pc,{sp:0,special:pc.special||'必殺技',specialCol:pc.specialCol||'#f1c40f'});

  // 味方設定
  var allyDefs=selectedAllyKeys.map(function(k){
    return ALLY_CHARS.filter(function(c){return c.key===k;})[0];
  }).filter(Boolean);
  CHAR_DEFS.ally1=allyDefs[0]||null;
  CHAR_DEFS.ally2=allyDefs[1]||null;

  // 武器設定
  setupSelectedWeapon=selectedWpnKey;

  document.getElementById('setupScreen').classList.remove('active');
  startStage(setupStageIdx);
}

var setupSelectedWeapon=null; // startStageで参照

// ═══════════════════════════════════════
//  SCROLL CAMERA
// ═══════════════════════════════════════
function updateCamera(){
  if(!player) return;
  var targetX=player.x-W*0.38;
  scrollX+=(targetX-scrollX)*0.08;
  scrollX=clamp(scrollX,0,stageWidth-W);
}

// ═══════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════
var lastT=0;
function loop(ts){
  requestAnimationFrame(loop);
  var dt=Math.min((ts-lastT)/16.67,3);lastT=ts;

  // shake
  if(SHMAG>0){SHX=(Math.random()-.5)*SHMAG;SHY=(Math.random()-.5)*SHMAG;SHMAG*=0.75;if(SHMAG<0.5)SHMAG=0;}
  else{SHX=0;SHY=0;}

  ctx.save();ctx.translate(SHX,SHY);

  if(gameMode!=='playing'){
    ctx.fillStyle='#0a0804';ctx.fillRect(0,0,W,H);
    ctx.restore();return;
  }

  try{

  gameTime++;
  updateCamera();

  // Spawn queue
  if(waveActive&&spawnQ.length>0){
    spawnT--;
    var onScreen=enemies.filter(function(e){return !e.dead;}).length;
    if(spawnT<=0&&onScreen<getMaxOnScreen()){
      spawnEnemy(spawnQ.shift());
      spawnT=25+rnd(20);
    }
  }

  // Draw BG
  drawBG(currentStage);

  // Weapon drops
  wDrops.forEach(drawWDrop);
  drawHealItems();

  // Update fighters
  playerInput();
  allies.forEach(allyAI);
  enemies.forEach(enemyAI);
  fighters.forEach(updateFighter);
  updateGSwing(player);

  // Sort by Y (depth)
  fighters.sort(function(a,b){return a.y-b.y;});
  fighters.forEach(drawFighter);

  // Particles
  PARTS=PARTS.filter(function(p){
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.92;p.vy=p.vy*0.92+(p.spark?0:0.1);
    p.life-=0.035;
    if(p.life<=0) return false;
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x-SHX,p.y-SHY,p.r*p.life,0,Math.PI*2);ctx.fill();
    return p.life>0;
  });
  ctx.globalAlpha=1;

  checkWaveClear();
  updateHUD();

  // Check game over
  if(player.dead){
    var allAlliesDead=allies.every(function(a){return a.dead;});
    if(allAlliesDead||allies.length===0){
      gameMode='gameover';
      setTimeout(gameOver,2000);
      ann('KO…','#c0392b','散った…');
    }
  }

  ctx.restore();
  }catch(err){
    ctx.restore();
    // エラーを画面に表示してゲームを止める
    gameMode='error';
    ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#e74c3c';ctx.font='bold 14px monospace';ctx.textAlign='center';
    ctx.fillText('ERROR: '+err.message,W/2,H/2-20);
    ctx.fillStyle='#aaa';ctx.font='11px monospace';
    var stk=(err.stack||'').split('\n')[1]||'';
    ctx.fillText(stk.trim().substring(0,60),W/2,H/2+10);
    ctx.fillText('画面をタップ/クリックで再起動',W/2,H/2+40);
    // canvas_onclick removed
    document.getElementById('c').onclick=function(){location.reload();};
    console.error(err);
  }
}

requestAnimationFrame(loop);
</script>
